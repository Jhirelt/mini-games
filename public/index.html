<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rifa de Minijuegos</title>
<link rel="stylesheet" href="style.css">
<style>
  .name-input-wrap{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;justify-content:center;}
  .name-input-wrap input{flex:1;min-width:180px;max-width:260px;background:var(--surface-2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:11px 14px;font-size:15px;text-align:center;}
  .name-input-wrap input:focus{outline:none;border-color:var(--accent);}
  .user-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px;justify-content:center;}
  .user-chip{background:var(--surface-2);border:1px solid var(--border);border-radius:20px;padding:7px 16px;cursor:pointer;font-size:13px;transition:border-color .12s,background .12s;}
  .user-chip:hover{border-color:var(--accent);background:var(--accent-dim);}
  .user-chip.taken{opacity:.3;cursor:not-allowed;text-decoration:line-through;}
  .user-chip.taken:hover{border-color:var(--border);background:var(--surface-2);}
</style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand"><span class="dot"></span><h1>Rifa de Minijuegos</h1></div>
    </div>

    <!-- selección de nombre -->
    <div id="screenJoin" class="card">
      <div class="eyebrow">Bienvenido</div>
      <h2 id="joinTitle">¿Cómo te llamas?</h2>
      <p class="muted" id="joinSub">Ingresa tu nombre para participar.</p>
      <div id="nameEntryArea">
        <div class="name-input-wrap">
          <input type="text" id="nameInput" placeholder="Tu nombre" maxlength="40" autocomplete="off">
          <button class="primary-btn" id="claimBtn">Entrar</button>
        </div>
        <div id="userList" class="user-list"></div>
      </div>
      <div id="joinMsg" class="msg" style="margin-top:12px;"></div>
    </div>

    <!-- esperando inicio -->
    <div id="screenWaiting" class="card hidden">
      <div class="eyebrow">Listo</div>
      <h2>Eres <span id="meName" class="accent"></span></h2>
      <p class="muted">Esperando que el administrador arranque el juego.</p>
      <div class="spinner"></div>
      <p class="muted" style="font-size:12px;margin-top:8px;">Para cambiar de nombre pide al administrador que te libere.</p>
    </div>

    <!-- juego iniciado -->
    <div id="screenStarted" class="card hidden">
      <div class="eyebrow">Arrancó</div>
      <h2 id="startedTitle">El juego comenzó</h2>
      <p class="muted">Jugando como <b id="meName2" class="accent"></b></p>
      <div id="attemptsInfo" class="msg" style="color:var(--text);margin-top:6px;"></div>
      <a id="playLink" class="spin-btn" href="#" target="_blank" style="margin-top:18px;display:inline-block;">Ir a jugar</a>
      <div class="live-leaderboard" id="liveLeaderboard" style="margin-top:24px;">
        <h3>Tabla del día</h3>
        <div id="leaderboardBody"></div>
      </div>
    </div>
  </div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
</body>
</html>
