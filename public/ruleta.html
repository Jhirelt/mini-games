<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruleta de Premios</title>
<link rel="stylesheet" href="style.css">
<style>
  .ruleta-wrap{display:flex;flex-direction:column;align-items:center;padding:10px 0 40px;}
  .ruleta-stage{position:relative;width:min(92vw,560px);aspect-ratio:1/1;}
  .ruleta-pointer{
    position:absolute; top:-6px; left:50%; transform:translateX(-50%); z-index:5;
    width:0;height:0;border-left:22px solid transparent;border-right:22px solid transparent;
    border-top:38px solid var(--text);
    filter:drop-shadow(0 4px 6px rgba(0,0,0,.5));
  }
  .ruleta-pointer::after{
    content:'';position:absolute;top:-36px;left:-14px;width:28px;height:28px;border-radius:50%;
    background:var(--accent);box-shadow:0 0 14px var(--accent);
  }
  .ruleta-wheel{
    width:100%;height:100%;border-radius:50%;position:relative;overflow:hidden;
    box-shadow:0 0 0 8px var(--surface), 0 0 0 11px var(--border), 0 18px 40px rgba(0,0,0,.6);
    transition:transform 4.5s cubic-bezier(.12,.8,.1,1);
  }
  .ruleta-hub{
    position:absolute;top:50%;left:50%;width:14%;height:14%;transform:translate(-50%,-50%);
    background:var(--surface);border:3px solid var(--border);border-radius:50%;z-index:4;
    display:flex;align-items:center;justify-content:center;font-size:22px;
  }
  .ruleta-status{margin-top:26px;color:var(--muted);font-size:14px;text-align:center;}
  .ruleta-winner{margin-top:6px;font-size:30px;font-weight:700;color:var(--accent);text-align:center;min-height:40px;}
  .ruleta-empty{color:var(--muted);text-align:center;padding:60px 20px;}
</style>
</head>
<body>
  <div class="wrap" style="max-width:760px;">
    <div class="topbar">
      <div class="brand"><span class="dot"></span><h1>Ruleta de Premios</h1></div>
    </div>

    <div class="ruleta-wrap">
      <div id="emptyMsg" class="ruleta-empty hidden">El administrador todavía no ha cargado los nombres de la ruleta.</div>
      <div id="stage" class="ruleta-stage hidden">
        <div class="ruleta-pointer"></div>
        <svg id="wheelSvg" class="ruleta-wheel" viewBox="0 0 200 200"></svg>
        <div class="ruleta-hub">🎉</div>
      </div>
      <div class="ruleta-status" id="statusText"></div>
      <div class="ruleta-winner" id="winnerText"></div>
    </div>
  </div>

<script src="/socket.io/socket.io.js"></script>
<script src="ruleta.js"></script>
</body>
</html>
