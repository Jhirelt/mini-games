<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Rifa</title>
<link rel="stylesheet" href="style.css">
<style>
  body{ background:var(--bg); }

  /* layout de dos columnas iguales, centradas en pantalla */
  #screenAdmin{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:18px;
    align-items:start;
    max-width:1100px;
    margin:0 auto;
    padding:0 0 40px;
  }
  @media(max-width:780px){ #screenAdmin{ grid-template-columns:1fr; } }

  .col-left{ display:flex; flex-direction:column; gap:14px; }
  .col-right{ display:flex; flex-direction:column; gap:14px; }

  .panel{ background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px; }
  .panel h3{ font-size:12px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin:0 0 12px; }

  .live-badge{ display:inline-block; width:7px; height:7px; border-radius:50%; background:#FF6B6B; margin-right:5px; animation:pulse 1.2s infinite; vertical-align:middle; }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:.3;} }

  .rank-row{ display:flex; justify-content:space-between; align-items:center; padding:7px 10px; border-radius:8px; margin-bottom:5px; background:var(--surface-2); }
  .rank-row .score{ font-family:monospace; font-size:15px; font-weight:700; color:var(--accent); }
  .rank-row.top1 .pname{ color:#FECA57; font-weight:700; }
  .rank-row.top2 .pname{ color:#B2BEC3; }
  .rank-row.top3 .pname{ color:#CD7F32; }

  .user-row{ display:flex; justify-content:space-between; align-items:center; padding:5px 8px; border-radius:7px; margin-bottom:3px; background:var(--surface-2); font-size:12px; }
  .dot-on{ display:inline-block; width:7px; height:7px; border-radius:50%; background:#1DD1A1; margin-right:5px; }
  .dot-off{ display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--border); margin-right:5px; }

  .compact-row{ display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
  select{ background:var(--surface-2); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:7px 10px; font-size:13px; flex:1; min-width:0; }
  textarea{ height:88px; resize:vertical; }
  .msg{ font-size:12px; margin-top:5px; min-height:14px; }

  /* el contenedor centra el contenido */
  #adminRoot{ max-width:1140px; margin:0 auto; padding:20px 24px 0; }
  .topbar{ max-width:1100px; margin-left:auto; margin-right:auto; }
</style>
</head>
<body>
<div id="adminRoot">
  <div class="topbar">
    <div class="brand"><span class="dot"></span><h1>Admin</h1></div>
    <div id="liveStatus" style="font-size:12px;color:var(--muted);"></div>
  </div>

  <!-- LOGIN -->
  <div id="screenLogin" class="card" style="max-width:380px;margin:0 auto;">
    <div class="eyebrow">Acceso</div>
    <h2>Llave de admin</h2>
    <input type="password" id="adminKey" placeholder="Clave" style="margin-top:12px;">
    <div class="compact-row" style="justify-content:center;">
      <button class="primary-btn" id="loginBtn">Entrar</button>
    </div>
    <div class="msg" id="loginMsg"></div>
  </div>

  <!-- PANEL: col izquierda = config, col derecha = leaderboard + jugadores -->
  <div id="screenAdmin" class="hidden">

    <!-- COL IZQUIERDA: toda la configuración -->
    <div class="col-left">

      <!-- Control del día -->
      <div class="panel">
        <h3>Control</h3>
        <div class="compact-row">
          <button class="primary-btn" id="startBtn" style="flex:1;">Iniciar juego</button>
          <button class="danger-btn" id="resetBtn">Reiniciar</button>
        </div>
        <div style="margin-top:12px;">
          <div style="font-size:11px;color:var(--muted);margin-bottom:5px;">Reto del día</div>
          <div class="compact-row">
            <select id="todayGameSelect"></select>
            <button class="primary-btn" id="setTodayBtn">Fijar</button>
          </div>
          <div class="msg" id="todayMsg"></div>
        </div>
        <div class="compact-row" style="margin-top:10px;">
          <button class="ghost-btn" id="openTestBtn" style="flex:1;font-size:12px;">Modo de prueba</button>
          <a class="ghost-btn" href="ruleta.html" target="_blank" style="text-decoration:none;display:inline-flex;align-items:center;font-size:12px;">Ruleta ↗</a>
        </div>
      </div>

      <!-- Lista de nombres -->
      <div class="panel">
        <h3>Lista de nombres <span style="color:var(--muted);font-weight:400;">(opcional)</span></h3>
        <p class="muted" style="font-size:11px;margin:0 0 7px;">Vacía = los jugadores escriben su nombre. Con nombres = solo pueden elegir de la lista.</p>
        <textarea id="namesInput" placeholder="Juan Pérez&#10;María Vargas&#10;..."></textarea>
        <div class="compact-row">
          <button class="primary-btn" id="saveNamesBtn">Guardar lista</button>
        </div>
      </div>

      <!-- Ruleta -->
      <div class="panel">
        <h3>Ruleta de premios</h3>
        <p class="muted" style="font-size:11px;margin:0 0 7px;">Hasta 40 nombres. Ábrela en pantalla grande antes de girar.</p>
        <textarea id="wheelNamesInput" placeholder="Nombre del ganador&#10;..."></textarea>
        <div class="compact-row">
          <button class="primary-btn" id="saveWheelBtn">Guardar</button>
          <button class="primary-btn" id="spinBtn" style="background:#FF9F43;color:#1a0a00;">Girar</button>
        </div>
        <div class="msg" id="wheelMsg"></div>
      </div>

    </div>

    <!-- COL DERECHA: resultados en vivo + jugadores -->
    <div class="col-right">

      <!-- Leaderboard -->
      <div class="panel">
        <h3><span class="live-badge"></span>Resultados en vivo &nbsp;<span id="liveGameLabel" style="color:var(--muted);font-size:11px;font-weight:400;text-transform:none;letter-spacing:0;">—</span></h3>
        <div id="liveResults"></div>
      </div>

      <!-- Jugadores -->
      <div class="panel">
        <h3>Jugadores <span id="connCount" style="color:var(--accent);font-size:12px;"></span></h3>
        <div id="userRows"></div>
      </div>

    </div>
  </div>
</div>
<script src="/socket.io/socket.io.js"></script>
<script src="admin.js"></script>
</body>
</html>
