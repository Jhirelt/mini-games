    const ctx=cv.getContext('2d');

    let shipX=W/2-SHIP_W/2, shipY=H-50;
    let leftKey=false, rightKey=false;
    let meteors=[], bullets=[];
    let rockets=0, rocketCd=0;          // cd: ms transcurridos hacia el próximo cohete
    let stillTimer=0, lastX=shipX;
    let elapsedMs=0, alive=true, spawnTimer=0;
    // estrellas de fondo fijas para este intento
    const stars=Array.from({length:55},()=>({
      x:Math.random()*W, y:Math.random()*H,
      r:Math.random()*1.4+.3, b:Math.random()*.5+.2
    }));

    // agregar keyhandlers DESPUÉS de un delay para evitar que el Space que inició
    // el juego dispare el primer cohete
    function kd(e){
      if(e.key==='ArrowLeft'||e.key.toLowerCase()==='a') leftKey=true;
      if(e.key==='ArrowRight'||e.key.toLowerCase()==='d') rightKey=true;
      if(e.code==='Space'){ e.preventDefault(); tryFire(); }
    }
    function ku(e){
      if(e.key==='ArrowLeft'||e.key.toLowerCase()==='a') leftKey=false;
      if(e.key==='ArrowRight'||e.key.toLowerCase()==='d') rightKey=false;
    }
    setTimeout(()=>{ window.addEventListener('keydown',kd); window.addEventListener('keyup',ku); }, 120);

    function tryFire(){
      if(!alive||rockets<=0) return;
      rockets--;
      document.getElementById('hudRockets').textContent=rockets;
      bullets.push({x:shipX+SHIP_W/2, y:shipY-4});
    }

    const loop=setInterval(()=>{
      if(!alive) return;
      elapsedMs+=20;
      const secs=Math.floor(elapsedMs/1000);
      const secsDisplay=(elapsedMs/1000).toFixed(1);
      document.getElementById('hudSecs').textContent=secsDisplay+'s';

      // cooldown del cohete: barra sube de 0 a ROCKET_CD ms
      rocketCd=Math.min(rocketCd+20, ROCKET_CD);
      if(rocketCd>=ROCKET_CD){ rocketCd=0; rockets++; document.getElementById('hudRockets').textContent=rockets; }

      // movimiento
      const spd=4.5;
      if(leftKey) shipX-=spd;
      if(rightKey) shipX+=spd;
      shipX=Math.max(4,Math.min(W-SHIP_W-4,shipX));

      // targeting: si lleva 3s quieto, spawnear meteorito directo
      if(Math.abs(shipX-lastX)<1) stillTimer+=20; else stillTimer=0;
      lastX=shipX;
      if(stillTimer>=3000){ stillTimer=0; meteors.push({x:shipX+SHIP_W/2,y:-20,r:18,t:true}); }

      // spawn random
      const fspd=2.4+secs*.2;
      const every=Math.max(200,650-secs*18);
      spawnTimer+=20;
      if(spawnTimer>=every){ spawnTimer=0; const r=10+Math.random()*10; meteors.push({x:Math.random()*(W-r*2)+r,y:-r,r,t:false}); }

      // mover meteoritos
      for(const m of meteors) m.y+=(m.t?Math.min(fspd+2,8):fspd);
      meteors=meteors.filter(m=>m.y<H+40);

      // mover balas
      for(const b of bullets) b.y-=10;
      bullets=bullets.filter(b=>b.y>-12);

      // bala vs meteorito
      outer: for(let i=bullets.length-1;i>=0;i--){
        const b=bullets[i];
        for(let j=meteors.length-1;j>=0;j--){
          const m=meteors[j];
          const dx=b.x-m.x, dy=b.y-m.y;
          if(dx*dx+dy*dy<(m.r+4)*(m.r+4)){
            bullets.splice(i,1); meteors.splice(j,1); continue outer;
          }
        }
      }

      // colisión nave
      for(const m of meteors){
        const cx=Math.max(shipX,Math.min(m.x,shipX+SHIP_W));
        const cy=Math.max(shipY,Math.min(m.y,shipY+SHIP_H));
        if((m.x-cx)**2+(m.y-cy)**2<m.r*m.r){ explodeAndEnd(secs); return; }
      }

      draw();
    },20);

    function draw(){
      ctx.fillStyle='#0d0e18'; ctx.fillRect(0,0,W,H);
      // estrellas
      stars.forEach(s=>{
        ctx.fillStyle=`rgba(255,255,255,${s.b})`;
        ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
      });
      // meteoritos
      for(const m of meteors){
        if(m.t){
          // targeting: rojo con anillo
          const gr=ctx.createRadialGradient(m.x-m.r*.3,m.y-m.r*.3,1,m.x,m.y,m.r);
          gr.addColorStop(0,'#ff9f9f');gr.addColorStop(1,'#cc2200');
          ctx.fillStyle=gr;ctx.beginPath();ctx.arc(m.x,m.y,m.r,0,Math.PI*2);ctx.fill();
          ctx.strokeStyle='rgba(255,80,80,.55)';ctx.lineWidth=2;
          ctx.beginPath();ctx.arc(m.x,m.y,m.r+5,0,Math.PI*2);ctx.stroke();
        } else {
          const gr=ctx.createRadialGradient(m.x-m.r*.3,m.y-m.r*.3,1,m.x,m.y,m.r);
          gr.addColorStop(0,'#c8d0d5');gr.addColorStop(.6,'#5a6268');gr.addColorStop(1,'#1e2226');
          ctx.fillStyle=gr;ctx.beginPath();ctx.arc(m.x,m.y,m.r,0,Math.PI*2);ctx.fill();
          ctx.fillStyle='rgba(255,255,255,.15)';ctx.beginPath();ctx.arc(m.x-m.r*.3,m.y-m.r*.3,m.r*.32,0,Math.PI*2);ctx.fill();
        }
      }
      // balas
      for(const b of bullets){
        const gr=ctx.createLinearGradient(b.x,b.y,b.x,b.y+18);
        gr.addColorStop(0,'#FECA57');gr.addColorStop(1,'rgba(254,202,87,0)');
        ctx.fillStyle=gr;ctx.fillRect(b.x-2,b.y,4,18);
        ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(b.x,b.y,3,0,Math.PI*2);ctx.fill();
      }
      // nave
      const sx=shipX,sy=shipY,sw=SHIP_W,sh=SHIP_H;
      const shipGr=ctx.createLinearGradient(sx,sy,sx,sy+sh);
      shipGr.addColorStop(0,'#FECA57');shipGr.addColorStop(1,'#FF9F43');
      ctx.fillStyle=shipGr;
      ctx.beginPath();ctx.moveTo(sx+sw/2,sy);ctx.lineTo(sx,sy+sh);ctx.lineTo(sx+sw,sy+sh);ctx.closePath();ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.28)';
      ctx.beginPath();ctx.moveTo(sx+sw/2,sy+3);ctx.lineTo(sx+sw*.3,sy+sh*.65);ctx.lineTo(sx+sw*.52,sy+sh*.65);ctx.closePath();ctx.fill();
      const cabGr=ctx.createRadialGradient(sx+sw/2,sy+sh*.44,1,sx+sw/2,sy+sh*.44,sw*.2);
      cabGr.addColorStop(0,'#48DBFB');cabGr.addColorStop(1,'#0984E3');
      ctx.fillStyle=cabGr;ctx.beginPath();ctx.ellipse(sx+sw/2,sy+sh*.44,sw*.2,sh*.17,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=`rgba(255,110,110,${.55+Math.random()*.45})`;
      ctx.beginPath();ctx.moveTo(sx+sw*.32,sy+sh);ctx.lineTo(sx+sw*.68,sy+sh);ctx.lineTo(sx+sw/2,sy+sh+7+Math.random()*6);ctx.closePath();ctx.fill();
      // barra de cooldown del cohete — esquina inferior derecha
      const BAR_X=W-54, BAR_Y=H-16, BAR_W2=46, BAR_H=7;
      ctx.fillStyle='rgba(255,255,255,.1)';ctx.fillRect(BAR_X,BAR_Y,BAR_W2,BAR_H);
      const pct=rocketCd/ROCKET_CD;
      const barColor=pct>=1?'#FECA57':`rgba(254,202,87,${.4+pct*.6})`;
      ctx.fillStyle=barColor;ctx.fillRect(BAR_X,BAR_Y,Math.floor(BAR_W2*pct),BAR_H);
      ctx.strokeStyle='rgba(255,255,255,.18)';ctx.lineWidth=1;ctx.strokeRect(BAR_X,BAR_Y,BAR_W2,BAR_H);
      ctx.fillStyle='rgba(255,255,255,.5)';ctx.font='8px sans-serif';ctx.textAlign='right';
      ctx.fillText('COHETE',BAR_X-3,BAR_Y+BAR_H-1);
    }

    function explodeAndEnd(secs){
      alive=false; clearInterval(loop);
      window.removeEventListener('keydown',kd);
      window.removeEventListener('keyup',ku);
      const cx=shipX+SHIP_W/2, cy=shipY+SHIP_H/2;
      let fr=0;
      const el=setInterval(()=>{
        fr++;
        ctx.fillStyle='#0d0e18';ctx.fillRect(0,0,W,H);
        stars.forEach(s=>{ctx.fillStyle=`rgba(255,255,255,${s.b})`;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();});
        [['rgba(255,107,107,'+(1-fr/10)+')',fr*5],['rgba(254,202,87,'+(0.8-fr/12)+')',fr*3],['rgba(255,255,255,'+(0.5-fr/12)+')',fr*1.8]].forEach(([c,r])=>{
          if(r>0){ctx.fillStyle=c;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();}
        });
        if(fr>=9){clearInterval(el);if(!recordAttempt(g.id,Math.round(elapsedMs/100)/10)) render();}
      },42);
    }

    draw();
  }

  render();
}

/* =====================================================================
   JUEGO 8 — ZIGZAG (la bola dobla con cada clic siguiendo la pista)
===================================================================== */
function gameZigzag(){
  const g = GAMES.find(x=>x.id==='zigzag');
  const W = 380, H = 480;
  const TRACK_HALF_WIDTH = 40; // qué tan ancha es la pista a cada lado del centro
  const BALL_R = 11;
  const BALL_SCREEN_Y = H*0.72; // la bola siempre se dibuja fija aquí; la pista se mueve

  function render(){
    screen.innerHTML = `
      ${gameShellHeader(g)}
      <div class="hud">
        <div class="stat">Sobreviviste<br><b id="hudSecs">0s</b></div>
      </div>
      <canvas id="zigzagCanvas" width="${W}" height="${H}"></canvas>
      <div style="text-align:center;color:var(--muted);font-size:12px;margin-top:-6px;">Clic o espacio para doblar — síguela justo cuando la pista cambia de dirección</div>
      <div style="text-align:center;margin-top:14px;">
        <p class="muted" style="margin:6px 0 14px;font-size:13px;">${g.desc}</p>
      <button class="primary-btn" id="startBtn" ${attemptsLeft(g.id)<=0?'disabled':''}>${attemptsLeft(g.id)<=0?'Sin intentos':'▶ Iniciar (Enter)'}</button>
      </div>
      <div id="resultSlot"></div>
    `;
    bindBack();
    if(attemptsLeft(g.id)>0){ document.getElementById('startBtn').addEventListener('click', startAttempt); bindEnterStart('startBtn'); }
    if(state.attempts[g.id].length){
      const last = state.attempts[g.id][state.attempts[g.id].length-1];
      document.getElementById('resultSlot').innerHTML = renderResultBox(g.id, last.score);
    }
    const cv = document.getElementById('zigzagCanvas');
    const ctx = cv.getContext('2d');
    ctx.fillStyle = '#1a1c24'; ctx.fillRect(0,0,W,H);
  }

  function startAttempt(){
    document.getElementById('startBtn').disabled = true;
    const cv = document.getElementById('zigzagCanvas');
    const ctx = cv.getContext('2d');

    // la pista se construye como una secuencia de segmentos diagonales de 45°.
    // no es perfectamente regular: la longitud de cada tramo varía al azar (a
    // veces sale una recta larga, a veces varios zigzags cortos seguidos), y de
    // vez en cuando el siguiente tramo sigue en la misma dirección en vez de
    // doblar siempre, para que no se sienta mecánico.
    let segments = [];
    let curX = 0, curY = 0, curDir = 1;
    function baseLenForSecs(secs){ return Math.max(60, 210 - secs*5); }
    function addSegment(len, dirOverride){
      const dir = dirOverride!=null ? dirOverride : curDir;
      const nx = curX + dir*len;
      const ny = curY - len;
      segments.push({x0:curX, y0:curY, x1:nx, y1:ny, dir});
      curX = nx; curY = ny; curDir = dir;
    }
    function addNextSegment(secs){
      const base = baseLenForSecs(secs);
      const lenFactor = 0.55 + Math.random()*1.35; // variación de longitud
      const len = base * lenFactor;
      const keepGoingStraight = Math.random() < 0.22; // ~22% de las veces no dobla
      addSegment(len, keepGoingStraight ? curDir : -curDir);
    }
    function ensureTrackAhead(targetY){
      while(curY > targetY) addNextSegment(elapsedSecs());
    }
    function trackCenterX(y){
      for(const s of segments){
        if(y <= s.y0+0.001 && y >= s.y1-0.001){
          return s.x0 + s.dir*(s.y0 - y);
        }
      }
      // si por algún motivo se pidió un punto más allá de lo generado, se extrapola
      const last = segments[segments.length-1];
      return last.x1 + last.dir*(last.y1 - y);
    }

    let ball = { x:0, y:0, dir:1 };
    let elapsedMs = 0, alive = true;
    function elapsedSecs(){ return elapsedMs/1000; }

    addSegment(baseLenForSecs(0), 1);
    ensureTrackAhead(-700);

    function onToggle(){ if(alive) ball.dir *= -1; }
    function keyHandler(e){ if(e.code==='Space'){ e.preventDefault(); onToggle(); } }
    cv.onclick = onToggle;
    window.addEventListener('keydown', keyHandler);

    const loop = setInterval(()=>{
      if(!alive) return;
      elapsedMs += 20;
      const secs = Math.floor(elapsedMs/1000);
      const secsDisplay = (elapsedMs/1000).toFixed(1);
      document.getElementById('hudSecs').textContent = secsDisplay+'s';

      // dificultad: más velocidad hacia adelante con el tiempo (la pista en sí ya
      // zigzaguea más seguido porque turnLenForSecs() se acorta con el tiempo)
      const forwardSpeed = Math.min(7.2, 2.4 + secs*0.14);

      ball.y -= forwardSpeed;
      ball.x += ball.dir*forwardSpeed;
      ensureTrackAhead(ball.y - 700);

      const centerX = trackCenterX(ball.y);
      const horizontalDeviation = Math.abs(ball.x - centerX);
      // la pista está en diagonal (45°), así que la distancia horizontal NO es
      // la distancia real hasta el borde — hay que proyectarla perpendicular a
      // la pista (dividir entre √2) para que el choque coincida con lo que se
      // ve dibujado en pantalla
      const perpDeviation = horizontalDeviation / Math.SQRT2;
      // solo muere cuando al menos ~4px de la bola ya están sobre el abismo,
      // no apenas su borde toca el filo de la pista
      const crashThresholdPerp = TRACK_HALF_WIDTH - BALL_R + 4;
      if(perpDeviation > crashThresholdPerp){
        endGame(secs);
        return;
      }

      draw();
    }, 20);

    function screenX(worldX){ return W/2 + (worldX - ball.x); }
    function screenY(worldY){ return BALL_SCREEN_Y + (worldY - ball.y); }

    const SQRT2 = Math.SQRT2;

    function draw(){
      // abismo: degradado radial muy oscuro al centro + casi negro en bordes
      const grad = ctx.createRadialGradient(W/2,H*0.5,20, W/2,H*0.5,H);
      grad.addColorStop(0, '#1a0a2e');   // centro: morado profundo
      grad.addColorStop(0.5, '#0d0818');
      grad.addColorStop(1, '#040208');   // borde: negro absoluto
      ctx.fillStyle = grad;
      ctx.fillRect(0,0,W,H);

      // puntos de luz en el abismo, simulando profundidad
      for(let i=0;i<8;i++){
        const gx=W*(.1+i*.12), gy=H*(.2+Math.sin(i*1.3)*.4);
        const gr2=ctx.createRadialGradient(gx,gy,0,gx,gy,25);
        gr2.addColorStop(0,'rgba(100,60,180,.12)');
        gr2.addColorStop(1,'rgba(100,60,180,0)');
        ctx.fillStyle=gr2; ctx.fillRect(0,0,W,H);
      }

      const visibleSegments = segments.filter(s => !(s.y0 < ball.y-520 || s.y1 > ball.y+200));
      const SQRT2 = Math.SQRT2;

      // PASO 1: cara lateral del borde — sombra 3D que cae hacia el abismo
      // Se dibuja como una franja oscura/translúcida desplazada hacia abajo y afuera,
      // creando la ilusión de que la pista tiene grosor antes del vacío
      const DEPTH = 8; // grosor visual de la caída
      visibleSegments.forEach(s=>{
        const px=1/SQRT2, py=s.dir/SQRT2;
        const hw=TRACK_HALF_WIDTH;
        // borde izquierdo: cara lateral cayendo al abismo
        const lax=screenX(s.x0-px*hw), lay=screenY(s.y0-py*hw);
        const lbx=screenX(s.x1-px*hw), lby=screenY(s.y1-py*hw);
        ctx.fillStyle='rgba(30,0,60,.9)';
        ctx.beginPath();
        ctx.moveTo(lax,lay); ctx.lineTo(lbx,lby);
        ctx.lineTo(lbx+DEPTH,lby+DEPTH); ctx.lineTo(lax+DEPTH,lay+DEPTH);
        ctx.closePath(); ctx.fill();
        // borde derecho
        const rax=screenX(s.x0+px*hw), ray=screenY(s.y0+py*hw);
        const rbx=screenX(s.x1+px*hw), rby=screenY(s.y1+py*hw);
        ctx.beginPath();
        ctx.moveTo(rax,ray); ctx.lineTo(rbx,rby);
        ctx.lineTo(rbx+DEPTH,rby+DEPTH); ctx.lineTo(rax+DEPTH,ray+DEPTH);
        ctx.closePath(); ctx.fill();
      });

      // PASO 2: parches CUADRADOS en los dobleces (sin border-radius) para tapar huecos
      ctx.fillStyle='#FF9F43';
      visibleSegments.forEach(s=>{
        // el parche cubre exactamente TRACK_HALF_WIDTH a cada lado del punto de cruce
        ctx.fillRect(
          screenX(s.x1) - TRACK_HALF_WIDTH,
          screenY(s.y1) - TRACK_HALF_WIDTH,
          TRACK_HALF_WIDTH*2,
          TRACK_HALF_WIDTH*2
        );
      });
      // parches de borde en dobleces (mismo pero desplazado para la cara lateral)
      ctx.fillStyle='rgba(30,0,60,.9)';
      visibleSegments.forEach(s=>{
        ctx.fillRect(
          screenX(s.x1) - TRACK_HALF_WIDTH + DEPTH/2,
          screenY(s.y1) - TRACK_HALF_WIDTH + DEPTH/2,
          TRACK_HALF_WIDTH*2+2,
          TRACK_HALF_WIDTH*2+2
        );
      });
      ctx.fillStyle='#FF9F43';
      visibleSegments.forEach(s=>{
        ctx.fillRect(
          screenX(s.x1) - TRACK_HALF_WIDTH,
          screenY(s.y1) - TRACK_HALF_WIDTH,
          TRACK_HALF_WIDTH*2,
          TRACK_HALF_WIDTH*2
        );
      });

      // PASO 3: superficie de la pista con degradado toy naranja/amarillo
      visibleSegments.forEach(s=>{
        const px=1/SQRT2, py=s.dir/SQRT2;
        const hw=TRACK_HALF_WIDTH;
        const ax=screenX(s.x0+px*hw), ay=screenY(s.y0+py*hw);
        const bx=screenX(s.x1+px*hw), by=screenY(s.y1+py*hw);
        const cx=screenX(s.x1-px*hw), cy=screenY(s.y1-py*hw);
        const dx=screenX(s.x0-px*hw), dy=screenY(s.y0-py*hw);
        // degradado a lo largo del segmento
        const sg=ctx.createLinearGradient(ax,ay,dx,dy);
        sg.addColorStop(0,'#FECA57');   // borde izq: amarillo
        sg.addColorStop(0.5,'#FF9F43'); // centro: naranja
        sg.addColorStop(1,'#FECA57');   // borde der: amarillo
        ctx.fillStyle=sg;
        ctx.beginPath();
        ctx.moveTo(ax,ay); ctx.lineTo(bx,by); ctx.lineTo(cx,cy); ctx.lineTo(dx,dy);
        ctx.closePath(); ctx.fill();
      });

      // PASO 4: bisel brillante en el filo superior de cada borde (línea de luz)
      ctx.lineWidth=2.5; ctx.lineCap='round';
      visibleSegments.forEach(s=>{
        const px=1/SQRT2, py=s.dir/SQRT2;
        const hw=TRACK_HALF_WIDTH;
        // línea de luz en borde izquierdo
        ctx.strokeStyle='rgba(255,220,100,.55)';
        ctx.beginPath();
        ctx.moveTo(screenX(s.x0-px*hw),screenY(s.y0-py*hw));
        ctx.lineTo(screenX(s.x1-px*hw),screenY(s.y1-py*hw));
        ctx.stroke();
        // línea de luz en borde derecho
        ctx.beginPath();
        ctx.moveTo(screenX(s.x0+px*hw),screenY(s.y0+py*hw));
        ctx.lineTo(screenX(s.x1+px*hw),screenY(s.y1+py*hw));
        ctx.stroke();
      });

      // bola toy con gradiente radial 3D
      ctx.fillStyle='rgba(0,0,0,.3)';
      ctx.beginPath();
      ctx.ellipse(W/2, BALL_SCREEN_Y+BALL_R*.65, BALL_R*.85, BALL_R*.35, 0, 0, Math.PI*2);
      ctx.fill();
      const ballGr=ctx.createRadialGradient(W/2-BALL_R*.3,BALL_SCREEN_Y-BALL_R*.3,1,W/2,BALL_SCREEN_Y,BALL_R);
      ballGr.addColorStop(0,'#A29BFE');
      ballGr.addColorStop(0.6,'#6C5CE7');
      ballGr.addColorStop(1,'#3d2c9e');
      ctx.fillStyle=ballGr;
      ctx.beginPath();
      ctx.arc(W/2, BALL_SCREEN_Y, BALL_R, 0, Math.PI*2);
      ctx.fill();
      // highlight
      ctx.fillStyle='rgba(255,255,255,.45)';
      ctx.beginPath();
      ctx.arc(W/2-BALL_R*.3, BALL_SCREEN_Y-BALL_R*.3, BALL_R*.28, 0, Math.PI*2);
      ctx.fill();
    }

    function endGame(secs){
      alive = false;
      clearInterval(loop);
      cv.onclick = null;
      window.removeEventListener('keydown', keyHandler);
      // flash de fin antes de mostrar resultado
      let f=0;
      const fl=setInterval(()=>{
        f++;
        ctx.fillStyle=`rgba(108,92,231,${.35-f*.07})`;
        ctx.fillRect(0,0,W,H);
        if(f>=5){ clearInterval(fl); if(!recordAttempt(g.id,Math.round(elapsedMs/100)/10)) render(); }
      },55);
    }

    draw();
  }

  render();
}

/* =====================================================================
   MODO JUGADOR REAL — pantalla de estado y arranque
===================================================================== */
function renderRealStatus(){
  const gameId = state.todayGameId;
  const g = GAMES.find(x=>x.id===gameId);

  if(!g){
    screen.innerHTML = `<div class="lobby-hero"><h2>Esperando al administrador</h2><p class="muted">Todavía no se ha definido el reto de hoy. Intenta de nuevo en un momento.</p></div>`;
    return;
  }

  const left = attemptsLeft(gameId);
  const best = bestScore(gameId);

  screen.innerHTML = `
    <div class="lobby-hero">
      <div class="eyebrow">Reto de hoy</div>
      <h2>${g.icon} ${g.name}</h2>
      <p>${g.desc}</p>
      ${left>0
        ? `<p>Tienes ${attemptsLabel(gameId)} intento(s) disponible(s).</p><button class="spin-btn" id="playTodayBtn">Jugar</button>`
        : `<p>Ya usaste tus 2 intentos de hoy.</p><div class="result-box" style="display:inline-block;text-align:left;"><div class="score">Tu mejor puntaje: ${best!=null ? best+(g.lowerIsBetter?' ms':'') : '—'}</div></div>`
      }
    </div>
    <div class="live-leaderboard">
      <h3>🏆 Mejores puntajes de hoy (en vivo)</h3>
      <div id="liveLeaderboardBody"></div>
    </div>
  `;
  renderLiveLeaderboard(gameId);
  if(left>0) document.getElementById('playTodayBtn').addEventListener('click', ()=> openGame(gameId));
}

function renderLiveLeaderboard(gameId){
  const body = document.getElementById('liveLeaderboardBody');
  if(!body) return;
  const g = GAMES.find(x=>x.id===gameId);
  const entries = Object.entries(state.serverResults)
    .filter(([, arr])=> arr.length>0)
    .map(([name, arr])=>({
      name,
      best: g.lowerIsBetter ? Math.min(...arr.map(a=>a.score)) : Math.max(...arr.map(a=>a.score)),
      attempts: arr.length,
    }))
    .sort((a,b)=> g.lowerIsBetter ? a.best-b.best : b.best-a.best);

  if(!entries.length){
    body.innerHTML = `<div class="empty">Todavía nadie ha intentado el reto de hoy.</div>`;
    return;
  }
  body.innerHTML = `
    <table>
      <thead><tr><th>#</th><th>Jugador</th><th>Mejor puntaje</th><th>Intentos</th></tr></thead>
      <tbody>
        ${entries.map((e,i)=>`
          <tr class="${e.name===REAL_NAME ? 'me-row':''}">
            <td>${i+1}</td>
            <td>${e.name===REAL_NAME ? 'Tú' : e.name}</td>
            <td>${e.best}${g.lowerIsBetter?' ms':''}</td>
            <td>${e.attempts}/2</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

if(REAL_MODE){
  screen.innerHTML = `<p class="muted" style="text-align:center;padding:60px 20px;">Conectando con el servidor…</p>`;
  socket = io();
  socket.on('state', (s)=>{
    state.serverResults = (s.today && s.today.results) || {};
    state.todayGameId = (s.today && s.today.gameId) || null;
    state.serverStarted = !!s.started;

    if(!realModeBooted){
      realModeBooted = true;
      if(!state.serverStarted){
        screen.innerHTML = `<div class="lobby-hero"><h2>Todavía no inicia</h2><p class="muted">Vuelve a la página principal y espera a que el administrador arranque el juego.</p></div>`;
        return;
      }
      renderRealStatus();
    }
    // si ya estamos jugando una partida en curso, no interrumpimos con un
    // re-render; la próxima vez que el jugador vuelva a la pantalla de estado
    // (al terminar su intento) ya se usan los datos más recientes del cierre.
  });
} else {
  /* =====================================================================
     INICIO (modo demo/admin — sin parámetros de jugador en la URL)
  ===================================================================== */
  renderLobby();
}
</script>
</body>
</html>
