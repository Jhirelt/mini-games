<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala de Juegos — Rifa Diaria</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:        #0f1117;
    --surface:   #181a24;
    --surface-2: #1f2130;
    --border:    #2e3148;
    --text:      #eceef2;
    --muted:     #8b8e98;
    --accent:    #FECA57;   /* toy amarillo — encendido/éxito */
    --accent-dim:#3a3010;
    --danger:    #FF6B6B;
    --danger-dim:#3a1515;
    --toy-blue:  #48DBFB;
    --toy-green: #1DD1A1;
    --toy-pink:  #FF6EB4;
    --toy-purple:#A29BFE;
    --toy-orange:#FF9F43;
    --p-pink:    #ffd2e6;
    --p-blue:    #cfe6ff;
    --p-yellow:  #fff1c2;
    --radius: 10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;}
  body{min-height:100vh;}
  h1,h2,h3{font-family:'Space Grotesk',sans-serif;margin:0;}
  button{font-family:'Inter',sans-serif;cursor:pointer;border:none;}
  .mono{font-family:'JetBrains Mono',monospace;}

  #app{max-width:980px;margin:0 auto;padding:28px 20px 60px;}

  /* ---------- TOP BAR ---------- */
  .topbar{display:flex;align-items:baseline;justify-content:space-between;border-bottom:1px solid var(--border);padding-bottom:16px;margin-bottom:28px;}
  .topbar .brand{display:flex;align-items:center;gap:10px;}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent);}
  .brand h1{font-size:18px;letter-spacing:.2px;}
  .topbar .date{color:var(--muted);font-size:13px;}

  .admin-toggle{margin-top:10px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .admin-toggle select{background:var(--surface-2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:12px;}
  .admin-toggle .tag{background:var(--surface-2);border:1px solid var(--border);padding:2px 8px;border-radius:20px;font-size:11px;color:var(--muted);}

  /* ---------- LOBBY ---------- */
  .lobby-hero{text-align:center;padding:40px 10px 30px;}
  .lobby-hero .eyebrow{color:var(--toy-blue);font-size:12px;letter-spacing:2px;text-transform:uppercase;font-weight:600;}
  .lobby-hero h2{font-size:34px;margin-top:10px;line-height:1.15;}
  .lobby-hero p{color:var(--muted);margin-top:10px;font-size:14px;max-width:480px;margin-inline:auto;}

  .spin-btn{margin-top:26px;background:var(--accent);color:#1a1200;font-weight:700;font-size:15px;padding:14px 30px;border-radius:30px;letter-spacing:.3px;transition:transform .15s ease;box-shadow:0 4px 20px rgba(254,202,87,.3);}
  .spin-btn:hover{transform:translateY(-2px);}
  .spin-btn:disabled{opacity:.4;cursor:default;transform:none;}

  /* ---------- ROULETTE ---------- */
  .wheel-wrap{display:flex;flex-direction:column;align-items:center;padding:30px 0;}
  .wheel{position:relative;width:280px;height:280px;border-radius:50%;background:conic-gradient(var(--surface-2) 0 20%,var(--surface) 0 40%,var(--surface-2) 0 60%,var(--surface) 0 80%,var(--surface-2) 0 100%);border:3px solid var(--border);display:flex;align-items:center;justify-content:center;transition:transform 3.2s cubic-bezier(.12,.8,.1,1);}
  .wheel .center{position:absolute;width:64px;height:64px;border-radius:50%;background:var(--bg);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;}
  .wheel .seg-label{position:absolute;font-size:11px;color:var(--muted);font-weight:600;text-align:center;width:70px;}
  .pointer{width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-bottom:18px solid var(--accent);margin-bottom:-6px;z-index:2;}
  .wheel-status{margin-top:18px;color:var(--muted);font-size:13px;min-height:18px;}
  .wheel-result{margin-top:6px;font-size:20px;font-weight:700;}

  /* ---------- GAME GRID (lobby list) ---------- */
  .game-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-top:30px;}
  .game-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;opacity:.4;}
  .game-card.today{opacity:1;border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset, 0 4px 18px rgba(254,202,87,.15);}
  .game-card .gi{font-size:26px;}
  .game-card h3{font-size:14px;margin-top:8px;}
  .game-card .st{font-size:11px;color:var(--muted);margin-top:4px;}
  .game-card.today .st{color:var(--accent);}

  /* ---------- GAME SCREEN SHELL ---------- */
  .game-screen{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:26px;margin-top:10px;}
  .game-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
  .game-header h2{font-size:20px;}
  .game-header p{color:var(--muted);font-size:13px;margin-top:4px;max-width:520px;}
  .back-btn{background:transparent;color:var(--muted);font-size:13px;border:1px solid var(--border);border-radius:20px;padding:6px 14px;}
  .back-btn:hover{color:var(--text);border-color:var(--text);}

  .hud{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:18px;font-size:13px;color:var(--muted);}
  .hud .stat b{color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:15px;display:block;}
  .hud .stat{background:var(--surface-2);border-radius:8px;padding:8px 14px;min-width:90px;border:1px solid var(--border);}

  .primary-btn{background:var(--accent);color:#1a1200;font-weight:700;font-size:14px;padding:10px 20px;border-radius:8px;box-shadow:0 2px 12px rgba(254,202,87,.25);transition:transform .1s;}
  .primary-btn:disabled{opacity:.35;cursor:default;}
  .primary-btn:not(:disabled):hover{transform:translateY(-1px);}
  .ghost-btn{background:var(--surface-2);color:var(--text);font-size:13px;padding:9px 18px;border-radius:8px;border:1px solid var(--border);}

  .result-box{margin-top:18px;background:var(--surface-2);border:1px dashed var(--border);border-radius:10px;padding:16px;font-size:14px;}
  .result-box .score{font-family:'JetBrains Mono',monospace;font-size:26px;color:var(--accent);}
  .leader-line{margin-top:8px;color:var(--muted);font-size:13px;}
  .leader-table{width:100%;margin-top:10px;border-collapse:collapse;font-size:13px;}
  .leader-table td,.leader-table th{padding:6px 8px;border-bottom:1px solid var(--border);text-align:left;}
  .leader-table th{color:var(--muted);font-weight:500;font-size:11px;text-transform:uppercase;}
  .me-row{color:var(--accent);font-weight:600;}

  /* ---------- GAME 1: REFLEJOS ---------- */
  .circ-grid{display:grid;grid-template-columns:repeat(3,90px);gap:18px;justify-content:center;margin:26px 0;}
  .circ{width:90px;height:90px;border-radius:50%;background:var(--surface-2);border:2px solid var(--border);transition:background .08s, transform .08s, box-shadow .15s;}
  .circ.lit{background:var(--accent);box-shadow:0 0 22px var(--accent);transform:scale(1.08);}
  .circ.hit{animation:circHit .35s ease-out;}
  @keyframes circHit{
    0%{transform:scale(1.25);background:#fff;box-shadow:0 0 30px #fff;}
    100%{transform:scale(1);}
  }
  .reflex-feed{text-align:center;color:var(--muted);font-size:13px;min-height:18px;margin-bottom:4px;}

  /* ---------- GAME 2: MEMORIA ---------- */
  .mem-grid{display:grid;grid-template-columns:repeat(4,84px);gap:12px;justify-content:center;margin:22px 0;}
  .mem-card{width:84px;height:84px;border-radius:10px;background:var(--surface-2);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:34px;cursor:pointer;transition:background .15s,transform .15s;}
  .mem-card.flip{background:var(--accent-dim);}
  .mem-card.matched{background:transparent;border-color:transparent;opacity:.35;cursor:default;}
  .mem-card.match-pulse{animation:memMatch .4s ease-out;}
  @keyframes memMatch{
    0%{transform:scale(1);}
    40%{transform:scale(1.18);box-shadow:0 0 24px var(--accent);}
    100%{transform:scale(1);}
  }
  .mem-card.wrong-shake{animation:memWrong .35s ease-in-out;}
  @keyframes memWrong{
    0%,100%{transform:translateX(0);}
    25%{transform:translateX(-6px);}
    75%{transform:translateX(6px);}
  }

  /* ---------- GAME 3: SERPIENTE ---------- */
  #snakeCanvas{background:var(--surface-2);border-radius:10px;display:block;margin:18px auto;border:1px solid var(--border);}

  /* ---------- GAME 4: APILAR ---------- */
  #stackCanvas{background:var(--surface-2);border-radius:10px;display:block;margin:18px auto;border:1px solid var(--border);}
  .stack-wrap{position:relative;width:380px;margin:0 auto;}
  .stack-feedback{position:absolute;top:8px;left:0;right:0;text-align:center;font-weight:700;font-size:14px;color:var(--accent);pointer-events:none;opacity:0;transition:opacity .15s;}
  .stack-feedback.show{opacity:1;}

  /* ---------- GAME 6/7: DOODLE & NAVES (canvas genérico) ---------- */
  #doodleCanvas, #navesCanvas, #zigzagCanvas{background:var(--surface-2);border-radius:10px;display:block;margin:18px auto;border:1px solid var(--border);}
  /* ---------- GAME 5: CENTRO (barra con aguja) ---------- */
  .centro-wrap{display:flex;justify-content:center;margin:32px 0;}
  .centro-bar{
    position:relative; width:420px; height:44px; border-radius:0; cursor:pointer;
    background:linear-gradient(to right,
      #e8625e 0%, #ff9a4d 12%, #ffd24d 25%, #6fe3c4 40%,
      #4fd9b3 50%,
      #6fe3c4 60%, #ffd24d 75%, #ff9a4d 88%, #e8625e 100%);
    border:1px solid var(--border);
    box-shadow: inset 0 2px 6px rgba(0,0,0,.35);
  }
  .centro-target{
    position:absolute; left:50%; top:-8px; bottom:-8px; width:5px; margin-left:-2.5px;
    background:var(--text); border-radius:0; box-shadow:0 0 6px rgba(255,255,255,.6);
  }
  .centro-needle{
    position:absolute; top:-12px; bottom:-12px; left:0; width:5px;
    background:var(--accent); border-radius:0; box-shadow:0 0 10px var(--accent);
  }
  .centro-click-flash{
    position:absolute; top:-8px; bottom:-8px; width:18px; margin-left:-9px;
    border-radius:50%; background:rgba(255,255,255,.85); pointer-events:none;
    animation:centroFlash .35s ease-out forwards;
  }
  @keyframes centroFlash{
    0%{opacity:1; transform:scale(.4);}
    100%{opacity:0; transform:scale(2.2);}
  }

  .live-leaderboard{margin-top:24px;text-align:left;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:16px;}
  .live-leaderboard h3{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:0 0 10px;}
  .live-leaderboard table{width:100%;border-collapse:collapse;font-size:13px;}
  .live-leaderboard td,.live-leaderboard th{padding:7px 8px;border-bottom:1px solid var(--border);text-align:left;}
  .live-leaderboard th{color:var(--muted);font-weight:500;font-size:11px;text-transform:uppercase;}
  .live-leaderboard .me-row{color:var(--accent);font-weight:700;}
  .live-leaderboard .empty{color:var(--muted);font-size:13px;padding:6px 0;}

  footer{text-align:center;color:var(--muted);font-size:12px;margin-top:50px;}

  @media (max-width:480px){
    .mem-grid{grid-template-columns:repeat(4,68px);}
    .mem-card{width:68px;height:68px;font-size:28px;}
    .wheel{width:230px;height:230px;}
  }

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important; animation:none !important;}
  }
</style>
</head>
<body>
<div id="app">

  <div class="topbar">
    <div>
      <div class="brand"><span class="dot"></span><h1>Sala de Juegos — Rifa Diaria</h1></div>
      <div class="admin-toggle" id="adminPanel">
        <span class="tag" style="background:#6fe3c424;border-color:var(--accent);color:var(--accent);">🛠 Modo Admin</span>
        <select id="adminGameSelect" title="Jugar este juego"></select>
        <button class="ghost-btn" id="adminPlayBtn" style="padding:3px 12px;font-size:12px;background:var(--accent);color:#0c1410;font-weight:700;">▶ Jugar</button>
        <button class="ghost-btn" id="toggleRevealBtn" style="padding:3px 10px;font-size:11px;" title="Simular la tabla de resultados de la última hora">📊 Revelar tabla</button>
        <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:11px;">
          <input type="checkbox" id="unlimitedToggle"> ∞ Sin límite de intentos
        </label>
        <span id="modeTag" style="font-size:11px;color:var(--muted);"></span>
      </div>
    </div>
    <div class="date mono" id="todayDate"></div>
  </div>

  <main id="screen"></main>

  <footer>Prototipo interno — modo de juego del día fijado por administración.</footer>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
/* =====================================================================
   DATA / ESTADO GLOBAL
===================================================================== */
const GAMES = [
  {id:'reflejos', icon:'⚡', name:'Reflejos', desc:'Haz clic en el círculo encendido. 5 rondas en 30 s. Menor promedio de ms = mejor.', lowerIsBetter:true},
  {id:'memoria',  icon:'🃏', name:'Memoria',  desc:'Encuentra las 8 parejas. Menor tiempo = mejor.', lowerIsBetter:true},
  {id:'serpiente',icon:'🟩', name:'Serpiente',desc:'Come manzanas. Evita tu cuerpo y las X. Más largo = más rápido.'},
  {id:'apilar',   icon:'🟫', name:'Apilar',   desc:'Suelta el bloque sobre el anterior. Encaja perfecto para no perder ancho.'},
  {id:'centro',   icon:'🎯', name:'Centro',   desc:'Clic cuando la aguja esté en el centro. 5 rondas, cada una más rápida.'},
  {id:'doodle',   icon:'🦘', name:'Doodle',   desc:'Flechas para moverse. Rebota solo. Verde: infinita, naranja: 2 saltos, roja: 1 salto.'},
  {id:'naves',    icon:'🚀', name:'Naves',    desc:'Esquiva meteoritos. Espacio para disparar cohete. Quieto 3 s = te apuntan.'},
  {id:'zigzag',   icon:'🔵', name:'Zigzag',   desc:'Clic para doblar. Sigue la pista o caes.'},
];

// ---------------------------------------------------------------------------
// MODO JUGADOR REAL vs MODO ADMIN
// ---------------------------------------------------------------------------
const urlParams = new URLSearchParams(location.search);
const REAL_NAME    = urlParams.get('name');
const REAL_SESSION = urlParams.get('session');
const ADMIN_KEY_URL= urlParams.get('admin');   // ?admin=TU_CLAVE -> modo admin
const REAL_MODE    = !!(REAL_NAME && REAL_SESSION);

// El panel admin solo se muestra cuando:
//  1. La URL trae ?admin=KEY  (enlace de admin desde admin.html)
//  2. No hay parámetros de jugador real (?name / ?session)
// En cualquier otro caso queda oculto.
const adminPanel = document.getElementById('adminPanel');
if(REAL_MODE || !ADMIN_KEY_URL){
  if(adminPanel) adminPanel.style.display = 'none';
  const ft = document.querySelector('footer');
  if(ft) ft.style.display = 'none';
}

let socket = null;
let realModeBooted = false;

const state = {
  todayGameId: GAMES[0].id,
  revealLeaderboard: false,
  adminUnlimited: false,
  attempts: {},
  mockBoards: {},
  serverResults: {},
  serverStarted: false,
};

const MOCK_RANGES = {
  reflejos:  [220, 650],
  memoria:   [25, 90],
  serpiente: [4, 22],
  apilar:    [3, 16],
  centro:    [55, 92],
  doodle:    [8, 60],
  naves:     [5, 45],
  zigzag:    [8, 50],
};

GAMES.forEach(g=>{
  state.attempts[g.id] = [];
  const n = 5 + Math.floor(Math.random()*6);
  const names = ['M. Rojas','J. Vargas','K. Solano','D. Pérez','A. Mora','L. Chinchilla','F. Salas','P. Araya','G. Bran','S. Quesada'];
  const shuffled = names.slice().sort(()=>Math.random()-0.5).slice(0,n);
  const scoreRange = MOCK_RANGES[g.id] || (g.lowerIsBetter ? [220,650] : [5,40]);
  state.mockBoards[g.id] = shuffled.map(nm=>({name:nm, score: scoreRange[0]+Math.floor(Math.random()*(scoreRange[1]-scoreRange[0]))}))
                                    .sort((a,b)=> g.lowerIsBetter ? a.score-b.score : b.score-a.score);
});

document.getElementById('todayDate').textContent = new Date().toLocaleDateString('es-CR',{weekday:'long',day:'2-digit',month:'long'});

const adminSelect = document.getElementById('adminGameSelect');
GAMES.forEach(g=>{
  const opt = document.createElement('option');
  opt.value = g.id; opt.textContent = g.icon+' '+g.name;
  adminSelect.appendChild(opt);
});
adminSelect.value = state.todayGameId;

// Botón "▶ Jugar" abre el juego seleccionado en el selector directamente
document.getElementById('adminPlayBtn').addEventListener('click', ()=>{
  const gameId = adminSelect.value;
  state.todayGameId = gameId;
  // resetea intentos de este juego para poder probar de nuevo
  if(state.adminUnlimited){ state.attempts[gameId] = []; }
  openGame(gameId);
});

adminSelect.addEventListener('change', e=>{
  state.todayGameId = e.target.value;
  renderLobby();
});

document.getElementById('toggleRevealBtn').addEventListener('click', ()=>{
  state.revealLeaderboard = !state.revealLeaderboard;
  document.getElementById('modeTag').textContent =
    state.revealLeaderboard ? '📊 tabla visible' : '';
});

document.getElementById('unlimitedToggle').addEventListener('change', e=>{
  state.adminUnlimited = e.target.checked;
  // resetea todos los intentos para probar libremente
  if(state.adminUnlimited){ GAMES.forEach(g=>{ state.attempts[g.id]=[]; }); }
  renderLobby();
});

const screen = document.getElementById('screen');

function todayGame(){ return GAMES.find(g=>g.id===state.todayGameId); }
function bestScore(gameId){
  const g = GAMES.find(x=>x.id===gameId);
  if(REAL_MODE){
    const arr = state.serverResults[REAL_NAME] || [];
    if(!arr.length) return null;
    return g.lowerIsBetter ? Math.min(...arr.map(a=>a.score)) : Math.max(...arr.map(a=>a.score));
  }
  const arr = state.attempts[gameId];
  if(!arr.length) return null;
  return g.lowerIsBetter ? Math.min(...arr.map(a=>a.score)) : Math.max(...arr.map(a=>a.score));
}

/* =====================================================================
   LOBBY
===================================================================== */
function renderLobby(){
  const tg = todayGame();
  screen.innerHTML = `
    <div class="lobby-hero">
      <div class="eyebrow">Concurso del día</div>
      <h2>${tg.icon} Hoy te toca: ${tg.name}</h2>
      <p>${tg.desc}</p>
      <p>Tienes hasta 2 intentos. Se guarda tu mejor puntaje. El cierre es automático al final de la jornada.</p>
      <button class="spin-btn" id="playTodayBtn">Jugar reto de hoy</button>
    </div>
    <div class="game-grid" id="gameGrid"></div>
  `;
  const grid = document.getElementById('gameGrid');
  GAMES.forEach(g=>{
    const isToday = g.id === tg.id;
    const best = bestScore(g.id);
    const card = document.createElement('div');
    card.className = 'game-card' + (isToday ? ' today' : '');
    card.innerHTML = `
      <div class="gi">${g.icon}</div>
      <h3>${g.name}</h3>
      <div class="st">${isToday ? (best!==null ? 'Jugado · mejor: '+best : 'Activo hoy') : 'No disponible hoy'}</div>
    `;
    grid.appendChild(card);
  });
  document.getElementById('playTodayBtn').addEventListener('click', ()=> openGame(tg.id));
}

/* =====================================================================
   NAVEGACIÓN A JUEGOS
===================================================================== */
function openGame(id){
  const cleanups = { current: null };
  switch(id){
    case 'reflejos': cleanups.current = gameReflejos(); break;
    case 'memoria':  cleanups.current = gameMemoria(); break;
    case 'serpiente':cleanups.current = gameSerpiente(); break;
    case 'apilar':   cleanups.current = gameApilar(); break;
    case 'centro':   cleanups.current = gameCentro(); break;
    case 'doodle':   cleanups.current = gameDoodle(); break;
    case 'naves':    cleanups.current = gameNaves(); break;
    case 'zigzag':   cleanups.current = gameZigzag(); break;
  }
}

function gameShellHeader(g){
  return `
    <div class="game-header">
      <div><h2>${g.icon} ${g.name}</h2></div>
      <button class="back-btn" id="backBtn">← Volver</button>
    </div>
  `;
}
function bindBack(){
  document.getElementById('backBtn').addEventListener('click', REAL_MODE ? renderRealStatus : renderLobby);
}

// arranca el juego con Enter O Espacio (además del clic en el botón)
function bindStartKeys(btnId){
  const btn = document.getElementById(btnId);
  if(!btn || btn.disabled) return;
  function onKey(e){
    if(e.key==='Enter' || e.code==='Space'){
      e.preventDefault();
      window.removeEventListener('keydown', onKey);
      btn.click();
    }
  }
  window.addEventListener('keydown', onKey);
  btn._startKeyCleanup = ()=> window.removeEventListener('keydown', onKey);
}
// alias para compatibilidad con las llamadas existentes
const bindEnterStart = bindStartKeys;

// muestra pantalla de "intento terminado" antes de re-renderizar el juego
function showAttemptDone(gameId, score, then){
  const g = GAMES.find(x=>x.id===gameId);
  const left = attemptsLeft(gameId);
  const isTime = ['naves','zigzag','memoria'].includes(gameId);
  const unit = g.lowerIsBetter && !isTime ? ' ms' : (isTime ? 's' : (gameId==='centro' ? '%' : ''));
  const disp = typeof score==='number' && score%1!==0 ? score.toFixed(gameId==='centro'?2:1) : score;
  screen.innerHTML = `
    <div style="text-align:center;padding:70px 20px 60px;">
      <div style="font-size:80px;font-weight:900;color:var(--accent);letter-spacing:-4px;line-height:1;font-family:'Space Grotesk',sans-serif;">${disp}${unit}</div>
      <div style="font-size:15px;color:var(--muted);margin-top:18px;">${left>0?`Te queda <b style="color:var(--text);">${left}</b> intento`:'Tus 2 intentos usados'}</div>
    </div>
  `;
  setTimeout(then, 2200);
}

function attemptsLeft(gameId){
  if(REAL_MODE){
    const arr = state.serverResults[REAL_NAME] || [];
    return Math.max(0, 2 - arr.length);
  }
  if(state.adminUnlimited) return Infinity;
  return 2 - state.attempts[gameId].length;
}
function attemptsLabel(gameId){
  const left = attemptsLeft(gameId);
  return left === Infinity ? '∞' : left;
}

// registra un intento. En modo real, el servidor es quien manda: se actualiza
// el contador local de inmediato (para que el resultado se vea correcto sin
// esperar la respuesta de red), y de fondo se confirma con el servidor — si
// el servidor lo rechaza (por ejemplo, ya se usaron los 2 intentos por una
// carrera entre pestañas), se avisa y la siguiente actualización en vivo del
// servidor corrige cualquier cosa que se haya mostrado de más.
function recordAttempt(gameId, score){
  if(REAL_MODE){
    if(!state.serverResults[REAL_NAME]) state.serverResults[REAL_NAME] = [];
    state.serverResults[REAL_NAME].push({score, ts:Date.now()});
    fetch('/api/attempt', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ name: REAL_NAME, sessionId: REAL_SESSION, score }),
    })
      .then(r=>r.json().then(data=>({ok:r.ok, data})))
      .then(({ok, data})=>{
        if(!ok){
          const slot = document.getElementById('resultSlot');
          if(slot) slot.innerHTML = `<div class="result-box" style="border-color:var(--danger);">${(data&&data.error)||'No se pudo guardar el intento.'}</div>`;
        }
      })
      .catch(()=>{
        const slot = document.getElementById('resultSlot');
        if(slot) slot.innerHTML = `<div class="result-box" style="border-color:var(--danger);">Sin conexión — revisa tu red e inténtalo de nuevo.</div>`;
      });
    showAttemptDone(gameId, score, ()=> openGame(gameId));
    return true; // caller must NOT call render()
  }
  state.attempts[gameId].push({score, ts:Date.now()});
  return false; // caller should call render()
}

function renderResultBox(gameId, lastScore){
  const g = GAMES.find(x=>x.id===gameId);
  const best = bestScore(gameId);
  const unit = g.lowerIsBetter ? ' ms' : '';

  if(REAL_MODE){
    // en modo real, recordAttempt ya llama showAttemptDone que muestra la pantalla
    // de feedback; esta función solo se usa en el modo demo/admin
    setTimeout(()=> renderLiveLeaderboard(gameId), 0);
    return `
      <div class="result-box">
        <div class="score">${best}${unit}</div>
        <div class="live-leaderboard" style="margin-top:14px;">
          <h3>🏆 Mejores puntajes de hoy (en vivo)</h3>
          <div id="liveLeaderboardBody"></div>
        </div>
      </div>
    `;
  }

  const board = state.mockBoards[gameId];
  const ahead = g.lowerIsBetter ? board.filter(p=>p.score < best).length : board.filter(p=>p.score > best).length;

  let leaderHtml = '';
  if(state.revealLeaderboard){
    const full = board.concat([{name:'Tú', score:best, me:true}]).sort((a,b)=> g.lowerIsBetter ? a.score-b.score : b.score-a.score);
    leaderHtml = `<table class="leader-table"><thead><tr><th>#</th><th>Jugador</th><th>Puntaje</th></tr></thead><tbody>
      ${full.map((p,i)=>`<tr class="${p.me?'me-row':''}"><td>${i+1}</td><td>${p.me?'Tú':p.name}</td><td>${p.score}${unit}</td></tr>`).join('')}
    </tbody></table>`;
  } else {
    leaderHtml = `<div class="leader-line">${ahead===0 ? '¡Vas en primer lugar!' : `Hay ${ahead} jugador${ahead>1?'es':''} por delante de ti.`}</div>`;
  }

  return `
    <div class="result-box">
      <div class="score">${best}${unit}</div>
      ${leaderHtml}
    </div>
  `;
}

/* =====================================================================
   JUEGO 1 — REFLEJOS (9 círculos en fila, 5 aciertos en 30s)
===================================================================== */
function gameReflejos(){
  const g = GAMES.find(x=>x.id==='reflejos');
  const TOTAL_MS = 30000;
  let timeouts = [], startTs = 0, reactions = [], litIndex = -1, litAt = 0, awaitingClick = false, ended = false;

  function render(){
    screen.innerHTML = `
      ${gameShellHeader(g)}
      <div class="hud">
        <div class="stat">Tiempo<br><b id="hudTime">30s</b></div>
        <div class="stat">Aciertos<br><b id="hudHits">0/5</b></div>
      </div>
      <div class="reflex-feed" id="reflexFeed">Presiona iniciar y espera... las luces aparecen en momentos al azar.</div>
      <div class="circ-grid" id="circGrid">
        ${Array.from({length:9}).map((_,i)=>`<div class="circ" data-i="${i}"></div>`).join('')}
      </div>
      <div style="text-align:center;">
        <p class="muted" style="margin:6px 0 14px;font-size:13px;">${g.desc}</p>
      <button class="primary-btn" id="startBtn" ${attemptsLeft(g.id)<=0?'disabled':''}>${attemptsLeft(g.id)<=0?'Sin intentos':'▶ Iniciar (Enter)'}</button>
      </div>
      <div id="resultSlot"></div>
    `;
    bindBack();
    if(attemptsLeft(g.id)>0){ document.getElementById('startBtn').addEventListener('click', startAttempt); bindEnterStart('startBtn'); }
    if(state.attempts[g.id].length){
      const last = state.attempts[g.id][state.attempts[g.id].length-1];
      document.getElementById('resultSlot').innerHTML = renderResultBox(g.id, last.score);
    }
  }

  function startAttempt(){
    document.getElementById('startBtn').disabled = true;
    reactions = []; ended = false; awaitingClick = false; litIndex = -1;
    startTs = performance.now();

    // 5 momentos aleatorios dentro de los 30s, con separación mínima entre ellos
    const minGap = 3500, lastSafe = TOTAL_MS - 1500;
    let moments = [];
    let cursor = 800; // pequeño margen inicial
    for(let i=0;i<5;i++){
      const remainingSlots = 5 - i;
      const maxStart = lastSafe - (remainingSlots-1)*minGap;
      const t = cursor + Math.random()*Math.max(300, (maxStart - cursor)/remainingSlots);
      moments.push(Math.min(t, lastSafe));
      cursor = moments[i] + minGap;
    }

    moments.forEach((t)=>{
      const handle = setTimeout(()=> lightOne(), t);
      timeouts.push(handle);
    });

    // contador visual de tiempo restante
    let timeLeft = 30;
    const clockInterval = setInterval(()=>{
      timeLeft--;
      const el = document.getElementById('hudTime');
      if(el) el.textContent = Math.max(timeLeft,0)+'s';
      if(timeLeft<=0){ clearInterval(clockInterval); }
    },1000);
    timeouts.push(clockInterval);

    timeouts.push(setTimeout(()=> finishIfNeeded(), TOTAL_MS + 1200));

    document.getElementById('circGrid').onclick = onCircClick;
  }

  function lightOne(){
    if(ended) return;
    document.querySelectorAll('.circ').forEach(c=>c.classList.remove('lit'));
    const i = Math.floor(Math.random()*9);
    litIndex = i; litAt = performance.now(); awaitingClick = true;
    const el = document.querySelector(`.circ[data-i="${i}"]`);
    if(el) el.classList.add('lit');
    const feed = document.getElementById('reflexFeed');
    if(feed) feed.textContent = `¡Ronda ${reactions.length+1}! Haz clic en el círculo encendido.`;
  }

  function onCircClick(e){
    if(!awaitingClick) return;
    const target = e.target.closest('.circ');
    if(!target) return;
    const idx = parseInt(target.dataset.i,10);
    if(idx === litIndex){
      const rt = Math.round(performance.now() - litAt);
      reactions.push(rt);
      awaitingClick = false;
      target.classList.remove('lit');
      target.classList.add('hit');
      setTimeout(()=> target.classList.remove('hit'), 350);
      document.getElementById('hudHits').textContent = reactions.length+'/5';
      const feed = document.getElementById('reflexFeed');
      if(feed) feed.textContent = `¡Acierto! Reacción: ${rt} ms. Esperando la siguiente luz...`;
      if(reactions.length>=5) finishIfNeeded();
    }
  }

  function finishIfNeeded(){
    if(ended) return;
    ended = true;
    timeouts.forEach(h=>{ clearTimeout(h); clearInterval(h); });
    document.querySelectorAll('.circ').forEach(c=>c.classList.remove('lit'));
    const grid = document.getElementById('circGrid');
    if(grid) grid.onclick = null;
    while(reactions.length<5) reactions.push(3000); // penalización si no completó
    const avgMs = Math.round(reactions.reduce((a,b)=>a+b,0)/reactions.length);
    if(!recordAttempt(g.id, avgMs)) render();
  }

  render();
}

function gameMemoria(){
  const g = GAMES.find(x=>x.id==='memoria');
  const symbols = ['🍒','🍋','🍇','🍉','🍓','🥝','🍑','🍍'];

  function render(){
    screen.innerHTML = `
      ${gameShellHeader(g)}
      <div class="hud">
        <div class="stat">Movimientos<br><b id="hudMoves">0</b></div>
        <div class="stat">Tiempo<br><b id="hudTime" class="mono">0s</b></div>
      </div>
      <div id="boardSlot"></div>
      <p class="muted" style="margin:6px 0 14px;font-size:13px;">${g.desc}</p>
      <button class="primary-btn" id="startBtn" ${attemptsLeft(g.id)<=0?'disabled':''}>${attemptsLeft(g.id)<=0?'Sin intentos':'▶ Iniciar (Enter)'}</button>
      <div id="resultSlot"></div>
    `;
    bindBack();
    if(attemptsLeft(g.id)>0){ document.getElementById('startBtn').addEventListener('click', startAttempt); bindEnterStart('startBtn'); }
    if(state.attempts[g.id].length){
      const last = state.attempts[g.id][state.attempts[g.id].length-1];
      document.getElementById('resultSlot').innerHTML = renderResultBox(g.id, last.score);
    }
  }

  function startAttempt(){
    document.getElementById('startBtn').disabled = true;
    let deck = symbols.concat(symbols).sort(()=>Math.random()-0.5);
    let flipped = [], matched = 0, moves = 0, seconds = 0, locked = false;

    document.getElementById('boardSlot').innerHTML = `<div class="mem-grid" id="memGrid"></div>`;
    const gridEl = document.getElementById('memGrid');
    deck.forEach((sym,i)=>{
      const card = document.createElement('div');
      card.className = 'mem-card';
      card.dataset.i = i;
      card.dataset.sym = sym;
      gridEl.appendChild(card);
    });

    const tick = setInterval(()=>{
      seconds = Math.round(seconds * 10 + 1) / 10;
      document.getElementById('hudTime').textContent = seconds.toFixed(1)+'s';
    },1000);

    gridEl.addEventListener('click', e=>{
      if(locked) return;
      const card = e.target.closest('.mem-card');
      if(!card || card.classList.contains('flip') || card.classList.contains('matched')) return;
      card.classList.add('flip');
      card.textContent = card.dataset.sym;
      flipped.push(card);
      if(flipped.length===2){
        moves++;
        document.getElementById('hudMoves').textContent = moves;
        locked = true;
        const [a,b] = flipped;
        if(a.dataset.sym === b.dataset.sym){
          a.classList.add('match-pulse'); b.classList.add('match-pulse');
          setTimeout(()=>{
            a.classList.add('matched'); b.classList.add('matched');
            a.classList.remove('match-pulse'); b.classList.remove('match-pulse');
            a.textContent=''; b.textContent='';
          }, 380);
          matched += 2;
          flipped = []; locked = false;
          if(matched === deck.length) setTimeout(finish, 420);
        } else {
          a.classList.add('wrong-shake'); b.classList.add('wrong-shake');
          setTimeout(()=>{
            a.classList.remove('flip','wrong-shake'); b.classList.remove('flip','wrong-shake');
            a.textContent=''; b.textContent='';
            flipped = []; locked = false;
          },650);
        }
      }
    });

    function finish(){
      clearInterval(tick);
      if(!recordAttempt(g.id, seconds)) render();
    }
  }

  render();
}

/* =====================================================================
   JUEGO 3 — SERPIENTE
===================================================================== */
function gameSerpiente(){
  const g = GAMES.find(x=>x.id==='serpiente');
  const CELL=24, COLS=26, ROWS=20, CW=26*24, CH=20*24;

  function render(){
    screen.innerHTML=`
      ${gameShellHeader(g)}
      <div class="hud">
        <div class="stat">Puntos<br><b id="hudScore">0</b></div>
        <div class="stat">Velocidad<br><b id="hudSpeed">1.0x</b></div>
      </div>
      <canvas id="snakeCanvas" width="${CW}" height="${CH}"></canvas>
      <div style="text-align:center;margin-top:14px;">
        <p class="muted" style="margin:6px 0 14px;font-size:13px;">${g.desc}</p>
        <button class="primary-btn" id="startBtn" ${attemptsLeft(g.id)<=0?'disabled':''}>${attemptsLeft(g.id)<=0?'Sin intentos':'Iniciar'}</button>
      </div>
      <div id="resultSlot"></div>`;
    bindBack();
    const btn=document.getElementById('startBtn');
    if(btn&&!btn.disabled){ btn.addEventListener('click',go); bindEnterStart('startBtn'); }
    const prev=state.attempts[g.id];
    if(prev.length) document.getElementById('resultSlot').innerHTML=renderResultBox(g.id,prev[prev.length-1].score);
    drawIdle();
  }

  function drawIdle(){
    const cv=document.getElementById('snakeCanvas'); if(!cv) return;
    const ctx=cv.getContext('2d');
    ctx.fillStyle='#0f1117'; ctx.fillRect(0,0,CW,CH);
    ctx.strokeStyle='rgba(255,255,255,.07)'; ctx.lineWidth=.5;
    for(let i=0;i<=COLS;i++){ctx.beginPath();ctx.moveTo(i*CELL,0);ctx.lineTo(i*CELL,CH);ctx.stroke();}
    for(let j=0;j<=ROWS;j++){ctx.beginPath();ctx.moveTo(0,j*CELL);ctx.lineTo(CW,j*CELL);ctx.stroke();}
  }

  function go(){
    const btn=document.getElementById('startBtn'); if(btn) btn.disabled=true;
    const cv=document.getElementById('snakeCanvas'); if(!cv) return;
    const ctx=cv.getContext('2d');

    let snake=[{x:8,y:7},{x:7,y:7},{x:6,y:7}];
    let vx=1,vy=0,nx=1,ny=0;
    let score=0,alive=true,flash=0;
    let tid=null;

    function spd(){ return Math.max(50,150-score*5); }

    // distancia de Chebyshev (max de diferencias absolutas), útil para "zona de exclusión" cuadrada
    function distHead(c){ return Math.max(Math.abs(c.x-snake[0].x), Math.abs(c.y-snake[0].y)); }
    function freeCell(c,also){
      return !snake.some(s=>s.x===c.x&&s.y===c.y)&&!(also&&also.some(a=>a.x===c.x&&a.y===c.y));
    }
    function rndPos(also){
      let c,n=0;
      do{ c={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)};n++; }
      while(n<400&&!freeCell(c,also));
      return c;
    }

    let food=rndPos();
    let poisons=[];
    function refreshP(){
      poisons=[];
      // menos X: solo 2 al inicio, máximo 6 al puntaje 20
      const n=Math.min(6, 2+Math.floor(score/4));
      let attempts=0;
      while(poisons.length<n && attempts<600){
        attempts++;
        const c={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)};
        // nunca dentro de las 3 celdas de la cabeza, ni encima de la comida/cuerpo/otras X
        if(distHead(c)<3) continue;
        if(!freeCell(c,poisons.concat([food]))) continue;
        poisons.push(c);
      }
    }
    refreshP();

    function onKey(e){
      if(e.key==='ArrowUp'   ||(e.key==='w'&&e.key.length===1)){if(vy===0){nx=0;ny=-1;}}
      else if(e.key==='ArrowDown'  ||(e.key==='s'&&e.key.length===1)){if(vy===0){nx=0;ny=1;}}
      else if(e.key==='ArrowLeft'  ||(e.key==='a'&&e.key.length===1)){if(vx===0){nx=-1;ny=0;}}
      else if(e.key==='ArrowRight' ||(e.key==='d'&&e.key.length===1)){if(vx===0){nx=1;ny=0;}}
    }
    const kdelay=setTimeout(()=>window.addEventListener('keydown',onKey),200);

    function tick(){
      if(!alive) return;
      vx=nx; vy=ny;
      const hx=snake[0].x+vx, hy=snake[0].y+vy;
      if(hx<0||hx>=COLS||hy<0||hy>=ROWS){die();return;}
      const body=snake.slice(0,-1);
      if(body.some(s=>s.x===hx&&s.y===hy)){die();return;}
      if(poisons.some(p=>p.x===hx&&p.y===hy)){die();return;}
      const ate=(hx===food.x&&hy===food.y);
      snake.unshift({x:hx,y:hy});
      if(ate){
        score++;
        flash=3;
        const se=document.getElementById('hudScore');
        const ve=document.getElementById('hudSpeed');
        if(se) se.textContent=score;
        if(ve) ve.textContent=(150/spd()).toFixed(1)+'x';
        food=rndPos(); refreshP();
        clearInterval(tid); tid=setInterval(tick,spd());
      } else { snake.pop(); }
      draw();
    }

    function drawApple(fx,fy){
      const cx=fx*CELL+CELL/2,cy=fy*CELL+CELL/2,r=CELL/2-2;
      ctx.fillStyle='rgba(0,0,0,.18)';
      ctx.beginPath();ctx.ellipse(cx,cy+r*.6,r*.62,r*.24,0,0,Math.PI*2);ctx.fill();
      const gr=ctx.createRadialGradient(cx-r*.3,cy-r*.3,1,cx,cy,r);
      gr.addColorStop(0,'#b8ffb0');gr.addColorStop(.65,'#4ecf68');gr.addColorStop(1,'#2a8040');
      ctx.fillStyle=gr;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.48)';ctx.beginPath();ctx.arc(cx-r*.28,cy-r*.28,r*.22,0,Math.PI*2);ctx.fill();
    }

    function drawSeg(sx,sy,color,isHead){
      const x=sx*CELL+1,y=sy*CELL+1,w=CELL-2,h=CELL-2;
      ctx.fillStyle=color;ctx.fillRect(x,y,w,h);
      ctx.fillStyle='rgba(255,255,255,.26)';ctx.fillRect(x,y,w,3);ctx.fillRect(x,y,3,h);
      ctx.fillStyle='rgba(0,0,0,.22)';ctx.fillRect(x,y+h-3,w,3);ctx.fillRect(x+w-3,y,3,h);
      if(isHead){
        const ex1=vx!==0?w*.6:w*.28,ey1=vy!==0?h*.6:h*.28;
        const ex2=vx!==0?w*.6:w*.7,ey2=vy!==0?h*.6:h*.7;
        ctx.fillStyle='#fff';
        [[ex1,ey1],[ex2,ey2]].forEach(([ex,ey])=>{
          ctx.beginPath();ctx.arc(x+ex,y+ey,2.8,0,Math.PI*2);ctx.fill();
          ctx.fillStyle='#111';ctx.beginPath();ctx.arc(x+ex+.5,y+ey+.5,1.3,0,Math.PI*2);ctx.fill();
          ctx.fillStyle='#fff';
        });
      }
    }

    function draw(){
      ctx.fillStyle=flash>0?'#1e3020':'#0f1117';
      ctx.fillRect(0,0,CW,CH);
      if(flash>0) flash--;
      // grilla más visible sobre fondo más oscuro
      ctx.strokeStyle='rgba(255,255,255,.07)';ctx.lineWidth=.5;
      for(let i=0;i<=COLS;i++){ctx.beginPath();ctx.moveTo(i*CELL,0);ctx.lineTo(i*CELL,CH);ctx.stroke();}
      for(let j=0;j<=ROWS;j++){ctx.beginPath();ctx.moveTo(0,j*CELL);ctx.lineTo(CW,j*CELL);ctx.stroke();}
      drawApple(food.x,food.y);
      ctx.shadowBlur=8;ctx.strokeStyle='#FF6B6B';ctx.shadowColor='#FF6B6B';ctx.lineWidth=2.5;
      poisons.forEach(p=>{
        const x=p.x*CELL,y=p.y*CELL;
        ctx.beginPath();ctx.moveTo(x+5,y+5);ctx.lineTo(x+CELL-5,y+CELL-5);ctx.stroke();
        ctx.beginPath();ctx.moveTo(x+CELL-5,y+5);ctx.lineTo(x+5,y+CELL-5);ctx.stroke();
      });
      ctx.shadowBlur=0;
      for(let i=snake.length-1;i>=0;i--){
        const t=i/snake.length;
        drawSeg(snake[i].x,snake[i].y,i===0?'#E4B5FF':`hsl(${272+t*20},70%,${37+t*13}%)`,i===0);
      }
    }

    function die(){
      if(!alive) return;
      alive=false;
      clearInterval(tid);
      clearTimeout(kdelay);
      window.removeEventListener('keydown',onKey);
      let f=0;
      const fl=setInterval(()=>{
        f++;ctx.fillStyle=`rgba(232,98,94,${.3-f*.06})`;ctx.fillRect(0,0,CW,CH);
        if(f>=5){clearInterval(fl);if(!recordAttempt(g.id,score)) render();}
      },55);
    }

    draw();
    tid=setInterval(tick,spd());
  }

  render();
}
/* =====================================================================
   JUEGO 4 — APILAR TILES
===================================================================== */
function gameApilar(){
  const g = GAMES.find(x=>x.id==='apilar');
  const W = 380, H = 480, BASE_W = 190, BLOCK_H = 32;

  // paleta estilo tienda de juguetes — brillante, saturada, divertida
  const TOY_PALETTE = [
    '#FF6B6B','#FF9F43','#FECA57','#48DBFB','#1DD1A1',
    '#FF6EB4','#A29BFE','#6C5CE7','#00CEC9','#FDCB6E',
    '#E17055','#74B9FF','#55EFC4','#FD79A8','#B2BEC3',
    '#E84393','#00B894','#0984E3','#D63031','#6AB04C',
  ];
  function randomColor(excludeColor){
    const filtered = excludeColor ? TOY_PALETTE.filter(c=>c!==excludeColor) : TOY_PALETTE;
    return filtered[Math.floor(Math.random()*filtered.length)];
  }
  function lighten(hex, amt=60){
    const n = parseInt(hex.slice(1),16);
    const r=Math.min(255,(n>>16)+amt), g=Math.min(255,((n>>8)&0xff)+amt), b=Math.min(255,(n&0xff)+amt);
    return `rgb(${r},${g},${b})`;
  }
  function darken(hex, amt=60){
    const n = parseInt(hex.slice(1),16);
    const r=Math.max(0,(n>>16)-amt), g=Math.max(0,((n>>8)&0xff)-amt), b=Math.max(0,(n&0xff)-amt);
    return `rgb(${r},${g},${b})`;
  }

  function render(){
    screen.innerHTML = `
      ${gameShellHeader(g)}
      <div class="hud">
        <div class="stat">Piso<br><b id="hudLayer">0</b></div>
      </div>
      <div class="stack-wrap">
        <div class="stack-feedback" id="stackFeedback">✨ Perfecto!</div>
        <canvas id="stackCanvas" width="${W}" height="${H}"></canvas>
      </div>
      <div style="text-align:center;color:var(--muted);font-size:12px;margin-top:-6px;">Clic o Espacio para soltar</div>
      <div style="text-align:center;margin-top:14px;">
        <p class="muted" style="margin:6px 0 14px;font-size:13px;">${g.desc}</p>
      <button class="primary-btn" id="startBtn" ${attemptsLeft(g.id)<=0?'disabled':''}>${attemptsLeft(g.id)<=0?'Sin intentos':'▶ Iniciar (Enter)'}</button>
      </div>
      <div id="resultSlot"></div>
    `;
    bindBack();
    if(attemptsLeft(g.id)>0){ document.getElementById('startBtn').addEventListener('click', startAttempt); bindEnterStart('startBtn'); }
    if(state.attempts[g.id].length){
      const last = state.attempts[g.id][state.attempts[g.id].length-1];
      document.getElementById('resultSlot').innerHTML = renderResultBox(g.id, last.score);
    }
    const cv = document.getElementById('stackCanvas');
    if(cv){ const ctx=cv.getContext('2d'); ctx.fillStyle='#1a1b24'; ctx.fillRect(0,0,W,H); }
  }

  function startAttempt(){
    document.getElementById('startBtn').disabled = true;
    const cv = document.getElementById('stackCanvas');
    const ctx = cv.getContext('2d');
    const feedbackEl = document.getElementById('stackFeedback');

    const baseColor = randomColor();
    let stack = [{x:W/2-BASE_W/2, w:BASE_W, color:baseColor, perfect:true}];
    let layer = 0;
    let curW = BASE_W;
    let curColor = baseColor;
    let missCount = 0;  // sube UNA unidad por cada tile no-perfecto
    let moving = null;
    let dropping = false;
    let alive = true;

    // la velocidad sube SOLO cuando fallas, de forma fija por cada fallo
    // independientemente de cuántos pixeles se perdieron en ese fallo
    function speedForMisses(n){ return 1.3 + n * 0.35; }
    function resetMoving(){
      const speed = speedForMisses(missCount);
      const dir = Math.random()<0.5?-1:1;
      moving = {x:dir===1?0:(W-curW), w:curW, dir, speed, color:curColor};
    }
    resetMoving();

    function flashPerfect(){
      feedbackEl.classList.add('show');
      setTimeout(()=>feedbackEl.classList.remove('show'),600);
    }

    function dropBlock(){
      if(!alive||dropping) return;
      dropping = true;
      const prev = stack[stack.length-1];
      const left = Math.max(moving.x, prev.x);
      const right = Math.min(moving.x+moving.w, prev.x+prev.w);
      let overlap = right-left;
      let newX = left;
      let isPerfect = false;
      let newColor;

      if(Math.abs(moving.x-prev.x)<=4){
        overlap = prev.w; newX = prev.x; isPerfect = true;
        newColor = prev.color;
      } else {
        newColor = randomColor(prev.color);
        missCount++;  // solo sube cuando NO se encajó perfecto
      }

      if(overlap<=0){ finish(); return; }

      stack.push({x:newX, w:overlap, color:newColor, perfect:isPerfect});
      layer++;
      curW = overlap;
      curColor = newColor;
      document.getElementById('hudLayer').textContent = layer;
      if(isPerfect) flashPerfect();
      resetMoving();
      dropping = false;
    }

    function keyHandler(e){ if(e.code==='Space'){e.preventDefault(); dropBlock();} }
    window.addEventListener('keydown', keyHandler);
    cv.onclick = dropBlock;

    const loop = setInterval(()=>{
      if(!alive||dropping){draw(); return;}
      moving.x += moving.dir*moving.speed;
      if(moving.x<=0){moving.x=0; moving.dir=1;}
      if(moving.x+moving.w>=W){moving.x=W-moving.w; moving.dir=-1;}
      draw();
    },20);

    // dibuja un bloque con efecto 3D (cara principal + bisel superior claro + bisel inferior oscuro + sombra)
    function drawBlock3d(x, y, w, h, color){
      const DEPTH = 5;
      // sombra proyectada
      ctx.fillStyle = 'rgba(0,0,0,.25)';
      ctx.fillRect(x+DEPTH, y+DEPTH, w, h);
      // cara lateral derecha (oscura)
      ctx.fillStyle = darken(color, 55);
      ctx.beginPath();
      ctx.moveTo(x+w, y); ctx.lineTo(x+w+DEPTH, y-DEPTH);
      ctx.lineTo(x+w+DEPTH, y+h-DEPTH); ctx.lineTo(x+w, y+h);
      ctx.closePath(); ctx.fill();
      // cara superior (clara)
      ctx.fillStyle = lighten(color, 55);
      ctx.beginPath();
      ctx.moveTo(x, y); ctx.lineTo(x+DEPTH, y-DEPTH);
      ctx.lineTo(x+w+DEPTH, y-DEPTH); ctx.lineTo(x+w, y);
      ctx.closePath(); ctx.fill();
      // cara frontal principal
      ctx.fillStyle = color;
      ctx.fillRect(x, y, w, h);
      // bisel interno (highlight)
      ctx.fillStyle = 'rgba(255,255,255,.22)';
      ctx.fillRect(x+2, y+2, w-4, 3);
      ctx.fillRect(x+2, y+2, 3, h-4);
    }

    // estrellas fijas: se generan una sola vez y se desplazan con el fondo
    const STARS = Array.from({length:80},()=>({
      x: Math.random()*W,
      y: Math.random()*H,
      r: Math.random()*1.5+.3,
      b: Math.random()*.7+.3,
    }));

    function draw(){
      const DEPTH = 5;
      const visible = stack.slice(-10);
      // el progreso del 0 (suelo) al 1 (galaxia) depende de cuántos pisos llevas
      const progress = Math.min(1, layer / 25);

      // fondo: interpola entre cielo nocturno (pocos pisos) y espacio profundo (muchos)
      const skyTop    = lerpColor('#1a2a4a','#03040e',progress);
      const skyBottom = lerpColor('#0f1a30','#000005',progress);
      const bg = ctx.createLinearGradient(0,0,0,H);
      bg.addColorStop(0, skyTop); bg.addColorStop(1, skyBottom);
      ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);

      // nebulosa sutil que aparece conforme subes
      if(progress > 0.3){
        const alpha = (progress-0.3)/0.7;
        const nx=W*0.6, ny=H*0.25;
        const ng=ctx.createRadialGradient(nx,ny,10,nx,ny,120);
        ng.addColorStop(0,`rgba(120,60,200,${alpha*.18})`);
        ng.addColorStop(0.5,`rgba(60,20,140,${alpha*.10})`);
        ng.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=ng; ctx.fillRect(0,0,W,H);
        const ng2=ctx.createRadialGradient(W*0.2,H*0.5,5,W*0.2,H*0.5,90);
        ng2.addColorStop(0,`rgba(30,80,180,${alpha*.14})`);
        ng2.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=ng2; ctx.fillRect(0,0,W,H);
      }

      // estrellas: se desplazan hacia abajo conforme la torre sube (efecto cámara)
      const starShift = layer * BLOCK_H * 0.6; // estrellas bajan cuando la torre sube
      STARS.forEach(s=>{
        const sy = (s.y + starShift) % H;
        const brightness = s.b * (0.4 + progress * 0.6);
        ctx.fillStyle = `rgba(255,255,255,${brightness})`;
        ctx.beginPath(); ctx.arc(s.x, sy, s.r, 0, Math.PI*2); ctx.fill();
      });

      // líneas guía muy sutiles
      ctx.strokeStyle = 'rgba(255,255,255,.03)'; ctx.lineWidth=1;
      for(let i=0;i<W;i+=40){ ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,H); ctx.stroke(); }

      visible.forEach((b,i)=>{
        const screenY = (H-BLOCK_H) - i*BLOCK_H;
        drawBlock3d(b.x, screenY, b.w, BLOCK_H-4, b.color);
      });

      if(alive && moving){
        const screenY = (H-BLOCK_H) - visible.length*BLOCK_H;
        drawBlock3d(moving.x, screenY, moving.w, BLOCK_H-4, moving.color);
        ctx.fillStyle = 'rgba(255,255,255,.5)';
        ctx.font = '14px sans-serif'; ctx.textAlign='center';
        ctx.fillText('▼', moving.x+moving.w/2, screenY-4);
      }
    }

    function lerpColor(a,b,t){
      const parse=h=>{ const n=parseInt(h.slice(1),16); return [(n>>16)&255,(n>>8)&255,n&255]; };
      const [ar,ag,ab]=parse(a), [br,bg,bb]=parse(b);
      const r=Math.round(ar+(br-ar)*t), gv=Math.round(ag+(bg-ag)*t), bv=Math.round(ab+(bb-ab)*t);
      return `rgb(${r},${gv},${bv})`;
    }

    function finish(){
      alive=false; clearInterval(loop);
      window.removeEventListener('keydown', keyHandler);
      cv.onclick=null;
      if(!recordAttempt(g.id, layer)) render();
    }

    draw();
  }

  render();
}

/* =====================================================================
   JUEGO 5 — VASOS (shell game, colores pastel, acelera y se intercambia)
===================================================================== */
function gameCentro(){
  const g = GAMES.find(x=>x.id==='centro');
  const BAR_W = 420, MARKER_W = 5;

  function render(){
    screen.innerHTML = `
      ${gameShellHeader(g)}
      <div class="hud">
        <div class="stat">Click<br><b id="hudClick">0/5</b></div>
        <div class="stat">Promedio<br><b id="hudLast">—</b></div>
      </div>
      <div class="centro-wrap">
        <div class="centro-bar" id="centroBar">
          <div class="centro-target"></div>
          <div class="centro-needle" id="centroNeedle"></div>
        </div>
      </div>
      <div style="text-align:center;margin-top:14px;">
        <p class="muted" style="margin:6px 0 14px;font-size:13px;">${g.desc}</p>
      <button class="primary-btn" id="startBtn" ${attemptsLeft(g.id)<=0?'disabled':''}>${attemptsLeft(g.id)<=0?'Sin intentos':'▶ Iniciar (Enter)'}</button>
      </div>
      <div id="resultSlot"></div>
    `;
    bindBack();
    if(attemptsLeft(g.id)>0){ document.getElementById('startBtn').addEventListener('click', startAttempt); bindEnterStart('startBtn'); }
    if(state.attempts[g.id].length){
      const last = state.attempts[g.id][state.attempts[g.id].length-1];
      document.getElementById('resultSlot').innerHTML = renderResultBox(g.id, last.score);
    }
  }

  function startAttempt(){
    document.getElementById('startBtn').disabled = true;
    const needle = document.getElementById('centroNeedle');
    const bar = document.getElementById('centroBar');

    const travel = BAR_W - MARKER_W; // recorrido real de la aguja (su borde izquierdo)
    const center = travel / 2;       // posición del centro exacto dentro de ese recorrido

    let clickCount = 0;
    let percents = [];
    let startTs = performance.now();
    // arranca lento y se acelera con cada uno de los 5 clicks (período más corto = más rápido)
    let periodMs = 2200;
    let rafId = null;
    let alive = true;
    let needleX = center; // única fuente de verdad: se actualiza cada frame y es lo
                           // que se usa tanto para dibujar como para calcular el click,
                           // así nunca hay desfase entre lo que ves y lo que se puntúa

    // onda triangular: a diferencia de un seno, la velocidad es constante en todo
    // el recorrido (no se frena en los bordes ni acelera en el centro)
    function triangleWave(t){
      const phase = t - Math.floor(t); // 0..1
      const y = phase < 0.5 ? phase*2 : 2 - phase*2; // 0..1..0 lineal
      return y*2 - 1; // -1..1
    }

    function tick(now){
      if(!alive) return;
      const t = (now - startTs) / periodMs;
      needleX = center + center * triangleWave(t);
      needle.style.transform = `translateX(${needleX}px)`;
      rafId = requestAnimationFrame(tick);
    }
    rafId = requestAnimationFrame(tick);

    function registerClick(){
      if(!alive) return;
      // usa exactamente la misma posición que se ve dibujada en este instante
      const distance = Math.abs(needleX - center);
      const percent = Math.max(0, 100 - (distance / center) * 100);
      percents.push(percent);
      clickCount++;
      const runningAvg = percents.reduce((a,b)=>a+b,0) / percents.length;
      document.getElementById('hudClick').textContent = clickCount+'/5';
      document.getElementById('hudLast').textContent = runningAvg.toFixed(2)+'%';

      // destello en el punto exacto donde se hizo clic, como feedback inmediato
      const flash = document.createElement('div');
      flash.className = 'centro-click-flash';
      flash.style.left = needleX + 'px';
      bar.appendChild(flash);
      setTimeout(()=> flash.remove(), 380);

      if(clickCount >= 5){
        // feedback visual del último clic: barra parpadea y la aguja se congela
        finish();
        return;
      }
      // cada click siguiente es más rápido que el anterior
      periodMs = Math.max(420, periodMs * 0.74);
      startTs = performance.now();
    }

    bar.onclick = registerClick;
    window.addEventListener('keydown', spaceHandler);
    function spaceHandler(e){ if(e.code==='Space'){ e.preventDefault(); registerClick(); } }

    function finish(){
      alive = false;
      cancelAnimationFrame(rafId);
      bar.onclick = null;
      window.removeEventListener('keydown', spaceHandler);
      const avg = percents.reduce((a,b)=>a+b,0) / percents.length;
      const finalScore = Math.round(avg*100)/100;

      // animar la barra parpadeando 3 veces antes de mostrar el resultado
      let flashes = 0;
      const flashInterval = setInterval(()=>{
        bar.style.opacity = flashes%2===0 ? '0.4' : '1';
        flashes++;
        if(flashes >= 6){
          clearInterval(flashInterval);
          bar.style.opacity = '1';
          // mover la aguja al centro (posición perfecta) como cierre visual
          needle.style.transition = 'transform .5s ease';
          needle.style.transform = `translateX(${(BAR_W-MARKER_W)/2}px)`;
          setTimeout(()=>{
            if(!recordAttempt(g.id, finalScore)) render();
          }, 600);
        }
      }, 120);
    }
  }

  render();
}

/* =====================================================================
   JUEGO 6 — DOODLE JUMP (espaciadora para rebotar en plataformas)
===================================================================== */
function gameDoodle(){
  const g = GAMES.find(x=>x.id==='doodle');
  const W = 360, H = 520;
  const PW=52, PH=12, PLAYER_R=15, JUMP_HEIGHT=180;

  function render(){
    screen.innerHTML = `
      ${gameShellHeader(g)}
      <div class="hud">
        <div class="stat">Altura<br><b id="hudHeight">0</b></div>
      </div>
      <canvas id="doodleCanvas" width="${W}" height="${H}"></canvas>
      <div style="text-align:center;color:var(--muted);font-size:12px;margin-top:-6px;">Flechas/A·D para moverte. 🟢 infinitas · 🟠 2 saltos · 🔴 1 salto y se cae</div>
      <div style="text-align:center;margin-top:14px;">
        <p class="muted" style="margin:6px 0 14px;font-size:13px;">${g.desc}</p>
      <button class="primary-btn" id="startBtn" ${attemptsLeft(g.id)<=0?'disabled':''}>${attemptsLeft(g.id)<=0?'Sin intentos':'▶ Iniciar (Enter)'}</button>
      </div>
      <div id="resultSlot"></div>
    `;
    bindBack();
    if(attemptsLeft(g.id)>0){ document.getElementById('startBtn').addEventListener('click', startAttempt); bindEnterStart('startBtn'); }
    if(state.attempts[g.id].length){
      const last = state.attempts[g.id][state.attempts[g.id].length-1];
      document.getElementById('resultSlot').innerHTML = renderResultBox(g.id, last.score);
    }
    const cv = document.getElementById('doodleCanvas');
    const ctx = cv.getContext('2d');
    ctx.fillStyle = '#242732'; ctx.fillRect(0,0,W,H);
  }

  // Todo el cálculo físico (jugador y plataformas) vive en un único sistema de
  // coordenadas de MUNDO, donde "y" más chico = más arriba. La cámara (cameraY)
  // es solo un desplazamiento que se aplica al final, únicamente al dibujar.
  // Nunca se mezclan coordenadas de mundo con coordenadas de pantalla.
  function startAttempt(){
    document.getElementById('startBtn').disabled = true;
    const cv = document.getElementById('doodleCanvas');
    const ctx = cv.getContext('2d');

    function makePlatform(worldY){
      // mientras más alto el puntaje actual, menos probabilidad de verde y más
      // de naranja/roja — siempre hay por dónde subir, pero arriesgas más si
      // dejas que una se rompa sin aprovecharla
      const difficulty = Math.min(1, maxHeightUnits / 60); // 0 al inicio, 1 a partir de cierta altura
      const greenChance  = 0.55 - difficulty*0.35; // de 0.55 baja hasta 0.20
      const orangeChance = 0.30 + difficulty*0.10; // de 0.30 sube hasta 0.40
      const r = Math.random();
      let type, uses;
      if(r < greenChance){ type='green'; uses=Infinity; }
      else if(r < greenChance+orangeChance){ type='orange'; uses=2; }
      else { type='red'; uses=1; }
      return { x: 16+Math.random()*(W-32-PW), y: worldY, w:PW, type, uses, falling:false, vy:0 };
    }

    let maxHeightUnits = 0;
    let player = { x: W/2, y: H-50, vy: 0, vx: 0 };
    let platforms = [];
    // primer piso: siempre verde e infinita, ancha, para poder calentar sin presión
    platforms.push({ x: W/2-PW, y: H-24, w: PW*2, type:'green', uses:Infinity, falling:false, vy:0 });
    let lastSpawnY = H-24;
    for(let i=1;i<9;i++){
      lastSpawnY -= 48 + Math.random()*28;
      platforms.push(makePlatform(lastSpawnY));
    }

    let cameraY = 0;       // se resta a todo lo que se dibuja; solo decrece (sube)
    let alive = true;
    let keys = {};

    function keyDown(e){
      const k = e.key.toLowerCase();
      if(k==='arrowleft'||k==='a') keys.left=true;
      if(k==='arrowright'||k==='d') keys.right=true;
    }
    function keyUp(e){
      const k = e.key.toLowerCase();
      if(k==='arrowleft'||k==='a') keys.left=false;
      if(k==='arrowright'||k==='d') keys.right=false;
    }
    window.addEventListener('keydown', keyDown);
    window.addEventListener('keyup', keyUp);

    const loop = setInterval(()=>{
      if(!alive) return;

      // dificultad: mientras más subes, más gravedad (todo se mueve/cae más rápido)
      const gravity = 0.44 + Math.min(0.5, maxHeightUnits/280);

      // movimiento horizontal
      if(keys.left) player.vx = -3.4;
      else if(keys.right) player.vx = 3.4;
      else player.vx *= 0.8;
      player.x += player.vx;
      if(player.x<PLAYER_R) player.x=PLAYER_R;
      if(player.x>W-PLAYER_R) player.x=W-PLAYER_R;

      // física vertical (coordenadas de mundo, sin cámara)
      const prevBottom = player.y + PLAYER_R;
      player.vy += gravity;
      player.y += player.vy;
      const currBottom = player.y + PLAYER_R;

      // aterrizaje: detección continua (evita atravesar) — si en el mismo
      // frame se cruzan varias plataformas, gana siempre la más alta (menor y)
      if(player.vy > 0){
        let landed = null;
        for(const p of platforms){
          if(p.falling) continue;
          const overlapX = (player.x + PLAYER_R) > p.x && (player.x - PLAYER_R) < (p.x + p.w);
          const crossed = prevBottom <= p.y && currBottom >= p.y;
          if(overlapX && crossed){
            if(!landed || p.y < landed.y) landed = p;
          }
        }
        if(landed){
          player.y = landed.y - PLAYER_R;
          // el impulso se escala junto con la gravedad para que la altura máxima
          // del salto sea siempre la misma — así todo se siente más rápido, pero
          // nunca se vuelve imposible alcanzar la siguiente plataforma
          player.vy = -Math.sqrt(2*gravity*JUMP_HEIGHT);
          if(landed.uses !== Infinity){
            landed.uses--;
            if(landed.uses <= 0){ landed.falling = true; landed.vy = 1.2; }
          }
        }
      }

      // plataformas ya rotas: siguen cayendo
      platforms.forEach(p=>{ if(p.falling){ p.vy += 0.25; p.y += p.vy; } });

      // la cámara solo sube (nunca retrocede) para mantener al jugador visible
      cameraY = Math.min(cameraY, player.y - H*0.45);

      // altura alcanzada, en unidades simples para el puntaje
      const heightUnits = Math.max(0, Math.round(((H-50) - player.y) / 12));
      if(heightUnits > maxHeightUnits) maxHeightUnits = heightUnits;
      document.getElementById('hudHeight').textContent = maxHeightUnits;

      // recicla plataformas fuera de vista (en coordenadas de pantalla) y genera nuevas arriba
      platforms = platforms.filter(p => (p.y - cameraY) < H+60);
      while(platforms.length < 9){
        lastSpawnY -= 48 + Math.random()*28;
        platforms.push(makePlatform(lastSpawnY));
      }

      // fin del juego: el jugador cae fuera de la vista (en pantalla)
      if((player.y - cameraY) > H+30){
        endGame();
        return;
      }

      draw();
    }, 20);

    function draw(){
      ctx.fillStyle = '#242732'; ctx.fillRect(0,0,W,H);
      platforms.forEach(p=>{
        ctx.fillStyle = p.falling ? '#e8625e' : (p.type==='green' ? '#6fe3c4' : p.type==='orange' ? '#ffb454' : '#e8625e');
        ctx.fillRect(p.x, p.y-cameraY, p.w, PH);
      });
      ctx.fillStyle = '#fff1c2';
      ctx.beginPath();
      ctx.arc(player.x, player.y-cameraY, PLAYER_R, 0, Math.PI*2);
      ctx.fill();
    }

    function endGame(){
      alive = false;
      clearInterval(loop);
      window.removeEventListener('keydown', keyDown);
      window.removeEventListener('keyup', keyUp);
      if(!recordAttempt(g.id, maxHeightUnits)) render();
    }

    draw();
  }

  render();
}

/* =====================================================================
